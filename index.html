<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Silver Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600;700&display=swap');

:root {
  --bg:#ede8df;
  --surface:#faf7f3;
  --surface2:#e8e1d6;
  --border:#c8bfb0;
  --ink:#18160f;
  --ink2:#3a3628;
  --ink3:#7a7060;
  --gold:#b89040;
  --gold2:#8a6a20;
  --radius:12px;
  --green:#1e5c38;
  --blue:#1e3d6e;
  --orange:#7a4810;
  --red:#6e2020;
  --purple:#4a2868;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Jost',sans-serif;min-height:100vh}
.app-shell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.12)}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
.nav-tab{flex:1;padding:14px 4px;text-align:center;font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;user-select:none;margin-bottom:-2px}
.nav-tab.active{color:var(--gold)!important;border-bottom-color:var(--gold)}

/* HEADER */
.glint-header{background:var(--surface);border-bottom:2px solid var(--border);padding:22px 20px 18px;text-align:center}
.glint-header img{height:38px;object-fit:contain}
.glint-header .subtitle{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-top:8px;font-weight:700}

/* PAGES */
.page{display:none;padding:0 14px 120px}
.page.active{display:block}

/* CARD */
.card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin-bottom:12px}

/* INPUTS */
.gen-input,.scan-input,.search-input,.sheet-input{
  width:100%;background:var(--surface);border:2px solid var(--border);border-radius:8px;
  padding:13px 14px;font-family:'Jost',sans-serif;font-size:14px;font-weight:400;
  color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;
}
.gen-input:focus,.scan-input:focus,.search-input:focus,.sheet-input:focus{border-color:var(--ink)}
.gen-input::placeholder,.scan-input::placeholder,.search-input::placeholder,.sheet-input::placeholder{color:var(--ink3)}
.scan-input{padding:15px 48px 15px 16px;font-size:16px;font-weight:500}
.sheet-input{font-size:12px}
.scan-input-wrap{position:relative}
.scan-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.3}
.gen-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}

/* BUTTONS */
.gen-btn{padding:13px 18px;background:var(--ink);border:none;border-radius:8px;color:#fff;font-family:'Jost',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.gen-btn:active{opacity:.8}
.log-btn{width:100%;padding:18px;background:var(--ink);border:none;border-radius:var(--radius);color:#fff;font-family:'Jost',sans-serif;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:4px}
.log-btn:active{opacity:.85}
.log-btn:disabled{opacity:.15;cursor:not-allowed}
.copy-btn{width:100%;padding:13px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);color:var(--gold2);font-family:'Jost',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;cursor:pointer;margin-bottom:10px}
.print-btn-main{width:100%;padding:16px;background:var(--ink);border:none;border-radius:var(--radius);color:#fff;font-family:'Jost',sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;margin-top:10px}
.print-btn-main:disabled{opacity:.15;cursor:not-allowed}

/* WORKERS */
.worker-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.worker-btn{padding:11px 20px;border-radius:50px;border:2px solid var(--border);background:var(--surface);color:var(--ink);font-family:'Jost',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.worker-btn.selected{border-color:var(--ink);background:var(--ink);color:#fff;font-weight:600}

/* STATUS GRID */
.status-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.status-btn{padding:15px 6px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Jost',sans-serif;font-weight:700;font-size:12px;letter-spacing:.03em;text-align:center;transition:all .18s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--ink)}
.status-btn .s-icon{font-size:20px;line-height:1}
.status-btn:active{transform:scale(.97)}
.status-btn.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.status-btn:hover:not(.sel){border-color:var(--ink2)}
.selected-status-label{text-align:center;font-size:10px;font-weight:600;color:var(--ink3);margin-top:10px;min-height:16px;letter-spacing:.08em;text-transform:uppercase}

/* HISTORY */
.log-entry{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--surface2)}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-meta{flex:1}
.log-id{font-size:13px;color:var(--ink);font-weight:700;letter-spacing:.04em}
.log-desc{font-size:13px;color:var(--ink2);margin-top:2px;font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:600}
.log-status{font-size:11px;color:var(--ink2);margin-top:2px;font-weight:500}
.log-who{font-size:10px;color:var(--ink3);margin-top:2px;letter-spacing:.04em;font-weight:500}
.log-time{font-size:10px;color:var(--ink3);text-align:right;flex-shrink:0;letter-spacing:.02em;font-weight:500}

/* TICKETS */
.ticket-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.ticket-card:hover{border-color:var(--ink);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.ticket-header{padding:16px}
.ticket-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ticket-id{font-size:11px;color:var(--gold2);letter-spacing:.14em;font-weight:700;text-transform:uppercase}
.ticket-count{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.06em}
.ticket-title{font-size:22px;color:var(--ink);font-weight:700;font-family:'Cormorant Garamond',serif;letter-spacing:.01em}
.ticket-sub{font-size:11px;color:var(--ink3);font-weight:600;letter-spacing:.04em}
.ticket-badge{display:inline-block;font-size:10px;padding:5px 12px;border-radius:6px;font-weight:700;font-family:'Jost',sans-serif;letter-spacing:.05em;background:var(--surface2);color:var(--ink2);border:2px solid var(--border);white-space:normal;max-width:180px;text-align:right;line-height:1.3}
.ticket-item-count{display:inline-block;font-size:11px;padding:6px 14px;border-radius:6px;font-weight:700;font-family:'Jost',sans-serif;letter-spacing:.06em;background:var(--ink);color:#fff;white-space:nowrap}
.ticket-items{display:none;border-top:2px solid var(--border);padding:14px 16px;background:var(--bg)}
.ticket-items.open{display:block}
.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-cb{width:18px;height:18px;accent-color:var(--ink);cursor:pointer;flex-shrink:0;margin-top:3px}
.item-info{flex:1}
.item-name{font-size:18px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-weight:700}
.item-meta{font-size:10px;color:var(--ink3);margin-top:4px;letter-spacing:.04em;font-weight:500}
.s-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.06em}
.s-open{background:#dce8f5;color:var(--blue)}
.s-progress{background:#f5eddc;color:var(--gold2)}
.s-done{background:#dceee5;color:var(--green)}
.search-bar{display:flex;gap:8px;margin-bottom:14px}

/* LABELS */
.label-preview-grid{display:block;margin-top:12px}
.label-preview-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.label-preview-card .qr-wrap{display:flex;justify-content:center;margin-bottom:8px}
.label-preview-card .lbl-id{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.08em}
.label-preview-card .lbl-name{font-size:13px;color:var(--ink2);margin-top:3px;font-family:'Cormorant Garamond',serif;font-weight:600;font-style:italic}
.label-preview-card .lbl-customer{font-size:10px;color:var(--ink3);margin-top:2px;font-weight:500}
.label-preview-card .lbl-sel{display:inline-block;margin-top:5px;font-size:9px;font-weight:700;color:var(--green);background:#dceee5;border-radius:4px;padding:2px 7px;letter-spacing:.04em}

/* SCRIPT */
.script-box{background:var(--ink);border:none;border-radius:var(--radius);padding:16px;font-size:11px;line-height:1.8;color:#9abf9a;overflow-x:auto;white-space:pre;margin-bottom:12px;max-height:260px;overflow-y:auto}
.step-list{list-style:none}
.step-list li{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface2);font-size:12px;line-height:1.5;color:var(--ink3)}
.step-list li:last-child{border-bottom:none}
.step-num{width:22px;height:22px;background:var(--ink);border-radius:50%;color:#fff;font-family:'Jost',sans-serif;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MISC */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{text-align:center;padding:24px;color:var(--ink3);font-size:13px;font-weight:500}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);border:none;border-radius:50px;padding:12px 24px;font-size:12px;font-weight:600;letter-spacing:.06em;color:#fff;opacity:0;transition:all .3s;z-index:999;pointer-events:none;max-width:440px;width:calc(100% - 40px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#default-badge{font-size:9px;font-weight:700;color:var(--gold2);background:rgba(184,144,64,.1);border:1.5px solid rgba(184,144,64,.3);border-radius:50px;padding:4px 12px;cursor:pointer;letter-spacing:.08em}

@media print{
  @page { size: 102mm 59mm; margin: 3mm; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body{ background:white; margin:0; padding:0; }
  .app-shell,.nav,.glint-header{ display:none!important; }
  .page{ display:none!important; }
  #page-tickets{ display:block!important; padding:0!important; }
  .no-print,.search-bar,.print-btn-main,.card,.ticket-card{ display:none!important; }
  #label-print-area{ display:block!important; }
  .label-preview-grid{ display:block; }
  .label-preview-card{
    display:block!important;
    width:96mm;
    height:53mm;
    page-break-after:always;
    break-after:page;
    border:none;
    padding:4mm;
    background:white;
    box-sizing:border-box;
    overflow:hidden;
  }
  .label-preview-card .qr-wrap{ margin-bottom:2mm; }
  .label-preview-card .qr-wrap img, .label-preview-card .qr-wrap canvas{ width:28mm!important; height:28mm!important; }
  .lbl-sel{ display:none!important; }
  .lbl-id{ font-size:14pt!important; font-weight:700!important; color:#000!important; }
  .lbl-name{ font-size:11pt!important; color:#000!important; }
  .lbl-customer{ font-size:9pt!important; color:#333!important; }
}
</style>
</head>
<body>
<div class="app-shell">

<!-- NAV -->
<nav class="nav no-print">
  <div class="nav-tab active" onclick="showPage('scan',this)">📡 Scan</div>
  <div class="nav-tab" onclick="showPage('history',this)">📋 My Log</div>
  <div class="nav-tab" id="print-tab" style="display:none" onclick="showPage('print',this)">🏷️ Print</div>
</nav>

<div class="glint-header no-print">
  <img src="https://cdn.prod.website-files.com/68483c15ac0fa89bf9f4e499/68503d0c3e98b1478cc0c410_logo.svg" alt="Glint Lacquer" onerror="this.src='https://cdn.prod.website-files.com/68483c15ac0fa89bf9f4e499/68503d5a96b630c2c4676399_logo-01.png'">
  <div class="subtitle">Item Tracking System</div>
</div>

<!-- ===== SCAN PAGE ===== -->
<div id="page-scan" class="page active">

  <div class="card" id="login-card" style="display:none">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--ink)">Worker Login</div>
      <div style="font-size:12px;color:var(--ink3);margin-top:2px">Enter your name and PIN to start</div>
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px">Your Name</label>
      <input id="login-name" class="gen-input" type="text" placeholder="e.g. Aron" autocomplete="off" style="width:100%">
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px">PIN</label>
      <input id="login-pin" class="gen-input" type="password" placeholder="4-digit PIN" autocomplete="off" inputmode="numeric" maxlength="6" style="width:100%">
    </div>
    <button onclick="doLogin()" class="log-btn" style="width:100%">Log In</button>
  </div>

  <div class="card" id="active-worker-card" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--ink3);font-weight:600;letter-spacing:.06em;text-transform:uppercase">Logged in as</div>
        <div style="font-size:24px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-weight:700;margin-top:2px" id="active-worker-name"></div>
      </div>
      <button onclick="doLogout()" style="background:var(--surface2);border:2px solid var(--border);border-radius:8px;color:var(--red);font-family:'Jost',sans-serif;font-size:11px;font-weight:700;padding:8px 14px;cursor:pointer;letter-spacing:.04em">Log Out</button>
    </div>
  </div>

  <div class="card" id="role-select-card" style="display:none">
    <div class="card-label">What are you doing now?</div>
    <div class="worker-row" id="role-row"></div>
  </div>

  <div class="card" id="scan-card" style="display:none">
    <div class="card-label" id="scan-card-label">Scan item</div>
    <div class="scan-input-wrap" style="margin-bottom:10px;display:flex;gap:8px">
      <div style="position:relative;flex:1">
        <input id="scan-input" class="scan-input" type="text" placeholder="Ready to scan..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="none" style="width:100%">
        <span class="scan-icon">▦</span>
      </div>
      <button onclick="toggleKeyboard()" id="keyboard-btn" class="gen-btn" style="flex-shrink:0;background:var(--surface2);border:2px solid var(--border);color:var(--ink2)" title="Show keyboard">⌨️</button>
      <button onclick="submitScan()" class="gen-btn" style="flex-shrink:0">Enter</button>
    </div>
    <button onclick="toggleCamera()" id="camera-btn" style="width:100%;padding:13px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--ink2);cursor:pointer;text-transform:uppercase;margin-bottom:10px">
      📷 Use Camera to Scan
    </button>
    <div id="camera-container" style="display:none;position:relative;border-radius:10px;overflow:hidden;margin-bottom:10px">
      <video id="camera-video" style="width:100%;border-radius:10px;display:block" autoplay muted playsinline></video>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:40%;border:3px solid var(--gold);border-radius:8px;pointer-events:none"></div>
      <button onclick="toggleCamera()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);border:none;border-radius:50px;color:white;font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer">✕ Close</button>
    </div>
  </div>

  <div class="card" id="active-work-panel" style="display:none;background:#eef7f2;border:2px solid var(--green)">
    <div style="text-align:center">
      <div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:.12em;text-transform:uppercase">▶ Currently Working On</div>
      <div id="active-work-name" style="font-size:20px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-weight:700;margin-top:6px;line-height:1.2"></div>
      <div id="active-work-task" style="font-size:12px;color:var(--green);font-weight:700;margin-top:2px;letter-spacing:.04em;text-transform:uppercase"></div>
      <div id="active-work-timer" style="font-size:32px;color:var(--ink);font-weight:700;margin-top:10px;font-variant-numeric:tabular-nums;letter-spacing:.02em">00:00</div>
      <div style="font-size:10px;color:var(--ink3);margin-top:2px">scan again to stop</div>
    </div>
  </div>

  <div class="card" id="scan-recent-card" style="display:none">
    <div class="card-label">Your recent scans</div>
    <div id="scan-recent-list"></div>
  </div>

</div>

<!-- ===== HISTORY PAGE ===== -->
<div id="page-history" class="page">
  <div class="card">
    <div class="card-label">Recent scans (this session)</div>
    <div id="history-list"><div style="color:var(--text-dim);font-size:12px;padding:8px 0">No entries yet</div></div>
  </div>
</div>

<div id="page-print" class="page">
  <div class="card" style="padding:12px">
    <div class="scan-input-wrap" style="display:flex;gap:8px;margin-bottom:0">
      <input id="pr-search" class="scan-input" type="text" placeholder="Search ticket # or customer..." style="flex:1" oninput="prFilter()">
      <button class="gen-btn" onclick="prLoad()">↻</button>
    </div>
  </div>
  <div id="pr-print-bar" style="display:none;position:sticky;top:0;z-index:5;margin-bottom:10px">
    <button class="log-btn" style="margin-top:0" onclick="prPrint()">🖨️ Print Selected (<span id="pr-count">0</span>)</button>
  </div>
  <div id="pr-list"><div style="color:var(--text-dim);font-size:12px;padding:16px;text-align:center">Loading tickets…</div></div>
</div>


</div><!-- app-shell -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let selectedWorker = null; // {name, roles:[...]}
let selectedRole = null; // current active role for this scan session
let sessionLog = [];
let roles = JSON.parse(localStorage.getItem('st_roles') || '["Cleaning","Polish","Lacquer"]');
let workers = JSON.parse(localStorage.getItem('st_workers') || '[{"name":"David","roles":["Cleaning"]},{"name":"Worker 2","roles":["Polish","Lacquer"]}]');
let sheetUrl = localStorage.getItem('st_url') || '';
let rdApiKey = 'smPSStC-zBCN-bVIU-d4Yv-zPlLiMrJf';
const SUPABASE_URL = 'https://pohjqjihxnikzpbqeevn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qwe9QzcFlwuNIPAqbhPjKg_LazIReyE';
let allTickets = [];
let itemCache = {}; // itemId -> {name, customer, ticketId}
let itemTaskState = JSON.parse(localStorage.getItem('st_item_task_state') || '{}'); // itemId::role -> 'in_progress' | null
let adminPin = localStorage.getItem('st_admin_pin') || '1234';
let newWorkerSelectedRoles = [];
let labelHistory = JSON.parse(localStorage.getItem('st_label_history') || '[]');
let labelSize = JSON.parse(localStorage.getItem('st_label_size') || '{"width":102,"height":59}');
let activeWork = JSON.parse(localStorage.getItem('st_active_work') || 'null'); // {itemId, name, task, startedAt}
let activeWorkTimer = null;

const RD_BASE = 'https://api.repairdesk.co/api/web/v1';
function getStatusColor(status) {
  if (status.includes('Stopped')) return '#8a5a20';
  if (status.includes('Started')) return '#1e5c38';
  return '#7a7060';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initDeviceWorker();

  renderLabelHistory();

  // Enter key to log in from PIN field
  const loginPin = document.getElementById('login-pin');
  if (loginPin) loginPin.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  const input = document.getElementById('scan-input');
  let lastInputTime = 0;
  let fastCharCount = 0;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = input.value.trim();
      if (val) processScan(val);
      fastCharCount = 0;
    }
  });

  // Detect hardware scanner: characters arrive in a rapid burst
  input.addEventListener('input', () => {
    const now = Date.now();
    const gap = now - lastInputTime;
    lastInputTime = now;

    if (gap < 40) {
      fastCharCount++;
    } else {
      fastCharCount = 0;
    }

    clearTimeout(window._scanTimer);
    window._scanTimer = setTimeout(() => {
      const val = input.value.trim();
      // If a burst of fast characters happened (scanner) and no Enter came, auto-submit
      if (fastCharCount >= 3 && val.length >= 4) {
        processScan(val);
        fastCharCount = 0;
      }
    }, 120);
  });
});

function submitScan() {
  const input = document.getElementById('scan-input');
  const val = input.value.trim();
  if (val) processScan(val);
}

    const q = SUPABASE_URL + '/rest/v1/scans?item_id=eq.' + encodeURIComponent(itemId) +
      '&role=eq.' + encodeURIComponent(task) + '&select=status,created_at&order=created_at.desc&limit=1';
    const resp = await fetch(q, { headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY} });
    const rows = await resp.json();
    if (Array.isArray(rows) && rows.length) {
      isInProgress = (rows[0].status || '').includes('Started');
    } else {
      isInProgress = false; // no history for this item+role
    }
  } catch(e) { /* offline — fall back to local state */ }

  const newStatus = isInProgress ? (task + ' Stopped') : (task + ' Started');

  // Sync local state to match
  if (isInProgress) { delete itemTaskState[stateKey]; }
  else { itemTaskState[stateKey] = 'in_progress'; }
  localStorage.setItem('st_item_task_state', JSON.stringify(itemTaskState));

  const info = itemCache[itemId] || {};

  // Update persistent active-work panel
  if (isInProgress) {
    // Stopped — clear active work if it was this item
    if (activeWork && activeWork.itemId === itemId && activeWork.task === task) {
      activeWork = null;
      localStorage.setItem('st_active_work', 'null');
      stopActiveWorkTimer();
    }
  } else {
    // Started — set active work
    activeWork = { itemId, name: info.name || itemId, task, startedAt: Date.now() };
    localStorage.setItem('st_active_work', JSON.stringify(activeWork));
    startActiveWorkTimer();
  }
  renderActiveWork();

  // Log it
  const entry = {
    itemId, itemDesc: info.name||'', customer: info.customer||'',
    status: newStatus, worker: selectedWorker.name, timestamp: new Date().toISOString()
  };
  sessionLog.unshift(entry);
  renderHistory();
  renderScanRecent();

  // Send to Supabase
  try {
    await fetch(SUPABASE_URL + '/rest/v1/scans', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        item_id: itemId,
        item_desc: info.name || '',
        customer: info.customer || '',
        city: info.city || '',
        status: newStatus,
        worker: selectedWorker.name,
        role: task
      })
    });
  } catch(e) {}

  if (navigator.vibrate) navigator.vibrate(isInProgress ? [50,50,50] : 120);
  showToast((isInProgress ? '⏹️ Stopped: ' : '✅ Now working: ') + task + ' on ' + itemId);

  // Clear input, ready for next scan
  document.getElementById('scan-input').value = '';
  setTimeout(() => {
    document.getElementById('scan-input').focus();
  }, 100);
}

function renderScanRecent() {

function renderActiveWork() {
  const panel = document.getElementById('active-work-panel');
  if (!panel) return;
  if (activeWork) {
    panel.style.display = 'block';
    document.getElementById('active-work-name').textContent = activeWork.name;
    document.getElementById('active-work-task').textContent = activeWork.task;
    updateActiveWorkTimer();
  } else {
    panel.style.display = 'none';
  }
}

function updateActiveWorkTimer() {
  if (!activeWork) return;
  const el = document.getElementById('active-work-timer');
  if (!el) return;
  const elapsed = Math.floor((Date.now() - activeWork.startedAt) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  const pad = n => String(n).padStart(2,'0');
  el.textContent = h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function startActiveWorkTimer() {
  stopActiveWorkTimer();
  activeWorkTimer = setInterval(updateActiveWorkTimer, 1000);
}

function stopActiveWorkTimer() {
  if (activeWorkTimer) { clearInterval(activeWorkTimer); activeWorkTimer = null; }
}

function updateRdStatus() {}

async function loadTickets() {
  if (!rdApiKey) return;
  const el = document.getElementById('tickets-list');
  el.innerHTML = '<div class="loading-row"><span class="spinner"></span>Loading tickets...</div>';
  try {
    // Fetch tickets newest first using default_order=1 (RepairDesk recommended param)
    let allFetched = [];
    let page = 1;
    let totalPages = 1;
    do {
      const resp = await fetch(`${RD_BASE}/tickets?api_key=${rdApiKey}&per_page=250&page=${page}&default_order=1`);
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      const data = await resp.json();
      const batch = (data.data && data.data.ticketData) || [];
      allFetched = allFetched.concat(batch);
      const pagination = data.data && data.data.pagination;
      totalPages = pagination ? parseInt(pagination.total_pages) : 1;
      page++;
    } while (page <= totalPages && page <= 2); // 2 pages = 500 tickets, enough for recent ones
    allTickets = allFetched;
    // Sort newest first by ticket ID number
    allTickets.sort(function(a, b) {
      var idA = parseInt((getOrderId(a) || '').replace(/[^0-9]/g,'')) || 0;
      var idB = parseInt((getOrderId(b) || '').replace(/[^0-9]/g,'')) || 0;
      return idB - idA;
    });
    renderTickets(allTickets);
  } catch(err) {
    el.innerHTML = `<div class="loading-row" style="color:var(--red)">⚠️ Could not load tickets.<br><br>
      <a href="${RD_BASE}/tickets?api_key=${rdApiKey}&per_page=5" target="_blank" style="color:var(--gold)">Test API directly ↗</a></div>`;
  }
}

function getCustomerName(t) {
  const s = t.summary;
  if (s && s.customer) return (s.customer.fullName || s.customer.firstName || 'Unknown').trim();
  return 'Unknown Customer';
}

function getCustomerCity(t) {
  const s = t.summary;
  return (s && s.customer && s.customer.city) ? s.customer.city : '';
}

function getCustomerPhone(t) {
  const s = t.summary;
  if (s && s.customer) return s.customer.mobile || s.customer.phone || '';
  return '';
}

function getTicketDates(t) {
  const s = t.summary;
  let created = '', due = '';
  if (s) {
    if (s.created_date) created = new Date(s.created_date*1000).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
    if (s.due_date) due = new Date(s.due_date*1000).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
  }
  return { created, due };
}

function getDeviceNote(device, ticket) {
  // Notes are in a separate ticket-level array, linked by deviceId
  const notesArr = (ticket && ticket.notes) || [];
  const devId = String(device.device ? device.device.id : (device.id || ''));
  const devName = device.device_name || (device.device ? device.device.name : '');
  // Collect all notes matching this device
  const matching = notesArr.filter(n =>
    String(n.deviceId) === devId ||
    (n.devicename && devName && n.devicename.toLowerCase().includes(devName.toLowerCase()))
  );
  return matching.map(n => (n.msg_text || '').trim()).filter(Boolean).join(' · ');
}

function getOrderId(t) {
  return (t.summary && t.summary.order_id) || t.id || '';
}

function getDevices(t) {
  return t.devices || [];
}

function getStatusClass(s) {
  if (!s) return 's-open';
  const sl = s.toLowerCase();
  if (sl.includes('deliver')||sl.includes('complete')) return 's-done';
  if (sl.includes('progress')||sl.includes('repair')) return 's-progress';
  return 's-open';
}

function renderTickets(tickets) {
  const el = document.getElementById('tickets-list');
  if (!tickets.length) { el.innerHTML='<div class="loading-row">No tickets found</div>'; return; }
  el.innerHTML = tickets.map(t => {
    const orderId = getOrderId(t);
    const customer = getCustomerName(t);
    const devices = getDevices(t);
    const itemCount = devices.length;
    const date = t.summary && t.summary.created_date
      ? new Date(t.summary.created_date*1000).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})
      : '';
    // Get most recent status from first device
    const status = devices[0] && devices[0].status ? devices[0].status.name : '';
    const statusClass = getStatusClass(status);
    const total = '';

    return `<div class="ticket-card" id="tc-${orderId}">
      <div class="ticket-header" onclick="toggleTicket('${orderId}')">
        <div>
          <div class="ticket-id">${orderId}</div>
          <div class="ticket-title">${customer}</div>
          <div class="ticket-sub">${date}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="ticket-badge ${statusClass}" style="font-size:9px;max-width:90px;text-align:right;line-height:1.3">${status}</span>
          <span style="font-size:10px;color:var(--ink3);font-weight:500;letter-spacing:.04em;margin-top:4px;display:block">${itemCount} item${itemCount!==1?'s':''} ↓</span>
        </div>
      </div>
      <div class="ticket-items" id="ti-${orderId}"></div>
    </div>`;
  }).join('');
}

function toggleTicket(orderId) {
  const itemsEl = document.getElementById('ti-'+orderId);
  if (itemsEl.classList.contains('open')) { itemsEl.classList.remove('open'); return; }
  itemsEl.classList.add('open');

  // Find ticket in allTickets
  const t = allTickets.find(t => getOrderId(t) === orderId);
  if (!t) return;

  const customer = getCustomerName(t);
  const devices = getDevices(t);
  renderTicketItems(orderId, customer, devices, itemsEl, t);
}

const CANDELABRA_PARTS = ['Base', 'Arms', 'Cups', 'Plates'];

function isCandelabra(name) {
  return /candelabra/i.test(name || '');
}

function renderTicketItems(orderId, customer, devices, itemsEl, ticket) {
  const safeOrderId = orderId.replace(/[^a-zA-Z0-9]/g, '_');
  // Ticket-level info for labels
  const city = ticket ? getCustomerCity(ticket) : '';
  const phone = ticket ? getCustomerPhone(ticket) : '';
  const dates = ticket ? getTicketDates(ticket) : { created:'', due:'' };

  itemsEl.innerHTML = devices.map((device, idx) => {
    const itemNum = idx + 1;
    const itemId = orderId + '-' + itemNum;
    const deviceName = device.device ? device.device.name : 'Item '+itemNum;
    const serial = device.serial ? ' #'+device.serial : '';
    const services = device.repairProdItems ? device.repairProdItems.map(s => s.name.trim()).join(', ') : '';
    const status = device.status ? device.status.name : '';
    const statusClass = getStatusClass(status);
    const note = getDeviceNote(device, ticket);

    // Cache for scan lookup + labels
    itemCache[itemId] = { name: deviceName + (serial||''), customer, ticketId: orderId, services, city, phone, note, created: dates.created, due: dates.due };

    const esc = s => (s||'').replace(/"/g,'&quot;').replace(/'/g,"&#39;");
    const safeDeviceName = esc(deviceName);
    const safeCustomer = esc(customer);
    const safeServices = esc(services);
    const safeCity = esc(city);
    const safePhone = esc(phone);
    const safeNote = esc(note);
    const cbId = 'cb-' + itemId.replace(/[^a-zA-Z0-9]/g,'_');

    let html = `<div class="item-row">
      <input type="checkbox" class="item-cb" id="${cbId}"
        onchange="updateSelectedCount()"
        data-item-id="${itemId}"
        data-item-name="${safeDeviceName}${serial}"
        data-services="${safeServices}"
        data-customer="${safeCustomer}"
        data-city="${safeCity}"
        data-phone="${safePhone}"
        data-note="${safeNote}"
        data-created="${esc(dates.created)}"
        data-due="${esc(dates.due)}"
        data-ticket="${orderId}">
      <div class="item-info">
        <div class="item-name">${deviceName}${serial}</div>
        ${services?`<div class="item-meta" style="color:var(--gold-dim)">${services}</div>`:''}
        ${note?`<div class="item-meta" style="color:var(--red)">📝 ${note}</div>`:''}
        <div class="item-meta">${itemId}${city?' · '+city:''}</div>`;

    // Candelabra split option
    if (isCandelabra(deviceName)) {
      const splitId = 'split-' + itemId.replace(/[^a-zA-Z0-9]/g,'_');
      html += `
        <button onclick="toggleCandelabraParts('${itemId}','${safeOrderId}',${itemNum},'${safeDeviceName}','${safeCustomer}','${safeServices}','${safeCity}','${safePhone}','${safeNote}','${esc(dates.created)}','${esc(dates.due)}')"
          style="margin-top:8px;background:var(--surface2);border:2px dashed var(--gold);border-radius:8px;color:var(--gold2);font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;padding:8px 12px;cursor:pointer;text-transform:uppercase;width:100%">
          ⚙️ Split into parts (Base · Arms · Cups · Plates)
        </button>
        <div id="${splitId}" style="display:none;margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)"></div>`;
    }

    html += `</div></div>`;
    return html;
  }).join('') + `<div style="padding:8px 0;display:flex;gap:8px">
    <button onclick="selectAllInTicket('${safeOrderId}',${devices.length},'${orderId}', true)"
      style="flex:1;background:var(--ink);border:2px solid var(--ink);border-radius:8px;color:#fff;font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;padding:10px 8px;cursor:pointer;text-transform:uppercase">
      ☑ Select All
    </button>
    <button onclick="selectAllInTicket('${safeOrderId}',${devices.length},'${orderId}', false)"
      style="flex:1;background:var(--surface2);border:2px solid var(--border);border-radius:8px;color:var(--ink2);font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;padding:10px 8px;cursor:pointer;text-transform:uppercase">
      ☐ Deselect All
    </button>
  </div>`;
}

function toggleCandelabraParts(itemId, safeOrderId, itemNum, deviceName, customer, services, city, phone, note, created, due) {
  const splitId = 'split-' + itemId.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById(splitId);
  if (!el) return;

  if (el.style.display === 'block') {
    el.style.display = 'none';
    el.innerHTML = '';
    updateSelectedCount();
    return;
  }

  const unesc = s => (s||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"');

  el.style.display = 'block';
  el.innerHTML = `<div style="font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Candelabra Parts — each gets its own label</div>` +
    CANDELABRA_PARTS.map(part => {
      const partId = itemId + '-' + part.toUpperCase();
      const partCbId = 'cb-' + partId.replace(/[^a-zA-Z0-9]/g,'_');
      const partName = deviceName + ' — ' + part;
      // Cache each part for scan lookup + labels
      itemCache[partId] = { name: unesc(partName), customer: unesc(customer), ticketId: safeOrderId, services: unesc(services), city: unesc(city), phone: unesc(phone), note: unesc(note), created, due, part };
      return `<div class="item-row" style="padding:8px 0">
        <input type="checkbox" class="item-cb" id="${partCbId}"
          onchange="updateSelectedCount()"
          data-item-id="${partId}"
          data-item-name="${deviceName} — ${part}"
          data-services="${services}"
          data-customer="${customer}"
          data-city="${city||''}"
          data-phone="${phone||''}"
          data-note="${note||''}"
          data-created="${created||''}"
          data-due="${due||''}"
          data-part="${part}"
          data-ticket="${safeOrderId}">
        <div class="item-info">
          <div class="item-name" style="font-size:15px">${part}</div>
          <div class="item-meta">${partId}</div>
        </div>
      </div>`;
    }).join('') +
    `<div style="display:flex;gap:6px;margin-top:8px">
      <button onclick="selectCandelabraParts('${itemId}',true)" style="flex:1;background:var(--ink);border:none;border-radius:6px;color:#fff;font-family:'Jost',sans-serif;font-size:10px;font-weight:700;padding:8px;cursor:pointer;text-transform:uppercase">All Parts</button>
      <button onclick="selectCandelabraParts('${itemId}',false)" style="flex:1;background:var(--surface2);border:2px solid var(--border);border-radius:6px;color:var(--ink2);font-family:'Jost',sans-serif;font-size:10px;font-weight:700;padding:8px;cursor:pointer;text-transform:uppercase">None</button>
    </div>`;

  updateSelectedCount();
}

function selectCandelabraParts(itemId, select) {
  CANDELABRA_PARTS.forEach(part => {
    const partId = itemId + '-' + part.toUpperCase();
    const cb = document.getElementById('cb-' + partId.replace(/[^a-zA-Z0-9]/g,'_'));
    if (cb) cb.checked = select;
  });
  updateSelectedCount();
}

function selectAllInTicket(safeOrderId, count, orderId, select=true) {
  for (let i=1; i<=count; i++) {
    const itemId = (orderId+'-'+i).replace(/[^a-zA-Z0-9]/g,'_');
    const cb = document.getElementById('cb-'+itemId);
    if (cb) cb.checked = select;
  }
  updateSelectedCount();
}

function selectAllItems(ticketId, count) {
  for (let i=1; i<=count; i++) {
    const cb = document.getElementById('cb-T'+ticketId+'-'+i);
    if (cb) cb.checked = true;
  }
  updateSelectedCount();
}

function updateSelectedCount() {
  const checked = document.querySelectorAll('.item-cb:checked').length;
  document.getElementById('selected-count').textContent = checked;
  document.getElementById('print-selected-btn').disabled = checked===0;
}

function filterTickets() {
  const q = document.getElementById('ticket-search').value.toLowerCase().trim();
  if (!q) { renderTickets(allTickets); return; }
  const filtered = allTickets.filter(t => {
    const id = (getOrderId(t) || '').toLowerCase();
    const cust = getCustomerName(t).toLowerCase();
    return id.includes(q) || cust.includes(q);
  });
  renderTickets(filtered);
}

function printSelected() {
  const checked = document.querySelectorAll('.item-cb:checked');
  if (!checked.length) { showToast('Select items first'); return; }

  const items = [];
  checked.forEach(cb => {
    items.push({
      itemId: cb.dataset.itemId,
      itemName: cb.dataset.itemName || '',
      services: cb.dataset.services || '',
      customer: cb.dataset.customer || '',
      city: cb.dataset.city || '',
      phone: cb.dataset.phone || '',
      note: cb.dataset.note || '',
      created: cb.dataset.created || '',
      due: cb.dataset.due || '',
      part: cb.dataset.part || ''
    });
  });

  // Log to label history
  items.forEach(item => {
    labelHistory = labelHistory.filter(h => h.itemId !== item.itemId);
    labelHistory.unshift({ ...item, printedAt: new Date().toISOString() });
  });
  localStorage.setItem('st_label_history', JSON.stringify(labelHistory));
  renderLabelHistory();

  // Send labels to Supabase
  items.forEach(item => {
    fetch(SUPABASE_URL + '/rest/v1/labels', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        item_id: item.itemId,
        item_name: item.itemName || '',
        customer: item.customer || '',
        city: item.city || '',
        note: item.note || '',
        part: item.part || ''
      })
    }).catch(()=>{});
  });

  showToast('⏳ Preparing labels...');

  const itemsWithBarcode = items.map(item => ({ ...item, barcodeSrc: generateBarcodeSVG(item.itemId) }));
  setTimeout(() => openPrintWindow(buildLabelHtml(itemsWithBarcode)), 100);
}

// ===== SETUP =====
function saveUrl() {
  if(!document.getElementById('sheet-url')) return;
  sheetUrl = document.getElementById('sheet-url').value.trim();
  localStorage.setItem('st_url', sheetUrl);
}
function copyScript() {
  if(!document.getElementById('script-box')) return;
  navigator.clipboard.writeText(document.getElementById('script-box').textContent)
    .then(()=>showToast('📋 Script copied!'))
    .catch(()=>showToast('Select and copy the script manually'));
}

// ===== CAMERA SCANNER =====
let cameraActive = false;
let codeReader = null;

async function toggleCamera() {
  if (cameraActive) {
    stopCamera();
  } else {
    startCamera();
  }
}

async function startCamera() {
  const container = document.getElementById('camera-container');
  const btn = document.getElementById('camera-btn');
  const video = document.getElementById('camera-video');

  // Step 1: explicitly request camera permission via getUserMedia (this triggers the prompt)
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
  } catch(err) {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      showToast('⚠️ Camera blocked. Tap the lock icon near the URL → Permissions → Camera → Allow, then reload.');
    } else if (err.name === 'NotFoundError') {
      showToast('⚠️ No camera found on this device');
    } else if (!window.isSecureContext) {
      showToast('⚠️ Camera needs HTTPS — make sure you opened the https:// link');
    } else {
      showToast('⚠️ Camera error: ' + err.name);
    }
    container.style.display = 'none';
    cameraActive = false;
    return;
  }

  // Permission granted — show video
  container.style.display = 'block';
  btn.textContent = '📷 Camera Active — Point at Barcode';
  btn.style.background = 'var(--ink)';
  btn.style.color = '#fff';
  cameraActive = true;

  try {
    video.setAttribute('playsinline', 'true');
    video.setAttribute('autoplay', 'true');
    video.setAttribute('muted', 'true');
    video.muted = true;
    video.srcObject = stream;

    // Wait for video to actually be ready (critical for iOS)
    await new Promise((resolve) => {
      if (video.readyState >= 2) { resolve(); return; }
      video.onloadedmetadata = () => resolve();
      setTimeout(resolve, 1500); // fallback timeout
    });

    try { await video.play(); } catch(playErr) {
      // iOS sometimes needs a user gesture retry
      setTimeout(() => video.play().catch(()=>{}), 300);
    }

    // Method 1: Native BarcodeDetector (best on Android Chrome)
    if ('BarcodeDetector' in window) {
      let formats = ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','qr_code'];
      try {
        const supported = await BarcodeDetector.getSupportedFormats();
        formats = formats.filter(f => supported.includes(f));
      } catch(e) {}
      const detector = new BarcodeDetector({ formats });
      window._cameraInterval = setInterval(async () => {
        if (!cameraActive) return;
        if (video.readyState < 2) return; // wait until frames available
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            const code = barcodes[0].rawValue;
            if (navigator.vibrate) navigator.vibrate(100);
            stopCamera();
            document.getElementById('scan-input').value = code;
            processScan(code);
          }
        } catch(e) {}
      }, 200);
    }
    // Method 2: ZXing library fallback (iOS Safari)
    else if (typeof ZXingBrowser !== 'undefined' || typeof ZXing !== 'undefined') {
      const ZX = (typeof ZXingBrowser !== 'undefined') ? ZXingBrowser : ZXing;
      try {
        codeReader = new ZX.BrowserMultiFormatReader();
        // decodeFromStream is more reliable on iOS than decodeFromVideoElement
        if (codeReader.decodeFromStream) {
          codeReader.decodeFromStream(stream, video, (result, err) => {
            if (result) {
              const code = result.getText ? result.getText() : result.text;
              if (navigator.vibrate) navigator.vibrate(100);
              stopCamera();
              document.getElementById('scan-input').value = code;
              processScan(code);
            }
          });
        } else {
          codeReader.decodeFromVideoElement(video, (result, err) => {
            if (result) {
              const code = result.getText ? result.getText() : result.text;
              if (navigator.vibrate) navigator.vibrate(100);
              stopCamera();
              document.getElementById('scan-input').value = code;
              processScan(code);
            }
          });
        }
      } catch(zerr) {
        showToast('⚠️ Scanner init failed: ' + zerr.message);
        stopCamera();
      }
    }
    else {
      showToast('⚠️ Barcode scanning not supported — type the code manually');
      stopCamera();
    }
  } catch(err) {
    showToast('⚠️ Scanner error: ' + err.message);
    stopCamera();
  }
}

function stopCamera() {
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }
  const video = document.getElementById('camera-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  if (window._cameraInterval) {
    clearInterval(window._cameraInterval);
    window._cameraInterval = null;
  }
  document.getElementById('camera-container').style.display = 'none';
  const btn = document.getElementById('camera-btn');
  btn.textContent = '📷 Use Camera to Scan';
  btn.style.background = '';
  btn.style.color = '';
  cameraActive = false;
}

// ===== LABEL HISTORY =====
function renderLabelHistory(filter='') {
  const el = document.getElementById('label-history-list');
  if (!el) return;
  const filtered = filter
    ? labelHistory.filter(h =>
        (h.itemId||'').toLowerCase().includes(filter) ||
        (h.itemName||'').toLowerCase().includes(filter) ||
        (h.customer||'').toLowerCase().includes(filter)
      )
    : labelHistory;

  if (!filtered.length) {
    el.innerHTML = '<div style="color:var(--ink3);font-size:12px;padding:12px 0;text-align:center">' + (filter ? 'No results' : 'No labels printed yet') + '</div>';
    return;
  }

  el.innerHTML = filtered.map((h, i) => {
    const d = new Date(h.printedAt);
    const dateStr = d.toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'});
    const timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:var(--gold2);letter-spacing:.06em">${h.itemId}</div>
        <div style="font-size:15px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-weight:600;margin-top:2px">${h.itemName||'—'}</div>
        ${h.services?`<div style="font-size:10px;color:var(--ink3);margin-top:2px">${h.services}</div>`:''}
        <div style="font-size:11px;color:var(--ink3);margin-top:2px;font-weight:500">${h.customer||'—'}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:10px;color:var(--ink3);font-weight:500">${dateStr}</div>
        <div style="font-size:10px;color:var(--ink3)">${timeStr}</div>
        <button onclick="reprintLabel(${i})" style="margin-top:6px;background:var(--ink);border:none;border-radius:6px;color:#fff;font-family:'Jost',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:.04em">↺ Reprint</button>
      </div>
    </div>`;
  }).join('');
}

function filterLabelHistory() {
  const q = document.getElementById('label-history-search').value.toLowerCase().trim();
  renderLabelHistory(q);
}

function clearLabelHistory() {
  if (!confirm('Clear all label history?')) return;
  labelHistory = [];
  localStorage.setItem('st_label_history', JSON.stringify(labelHistory));
  renderLabelHistory();
  showToast('Label history cleared');
}

function reprintLabel(idx) {
  const h = labelHistory[idx];
  if (!h) return;
  const item = { ...h, barcodeSrc: generateBarcodeSVG(h.itemId) };
  openPrintWindow(buildLabelHtml([item]));
}

// ===== LABEL SIZE =====
function loadLabelSizeInputs() {
  const wI = document.getElementById('label-width-input');
  const hI = document.getElementById('label-height-input');
  if (wI) wI.value = labelSize.width;
  if (hI) hI.value = labelSize.height;
}

function saveLabelSize() {
  const w = parseFloat(document.getElementById('label-width-input').value);
  const h = parseFloat(document.getElementById('label-height-input').value);
  if (!w || !h || w < 10 || h < 10) { showToast('Enter valid dimensions'); return; }
  labelSize = { width: w, height: h };
  localStorage.setItem('st_label_size', JSON.stringify(labelSize));
  showToast('✅ Label size saved: ' + w + ' × ' + h + ' mm');
}

function setLabelPreset(w, h) {
  labelSize = { width: w, height: h };
  localStorage.setItem('st_label_size', JSON.stringify(labelSize));
  loadLabelSizeInputs();
  showToast('✅ Label size: ' + w + ' × ' + h + ' mm');
}

// ===== TOAST =====
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
