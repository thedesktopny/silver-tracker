<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glint — Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
:root{
  --bg:#f6f7fb; --ink:#12141c; --ink2:#4b5165; --ink3:#8b90a3;
  --gold:#4f46e5; --gold2:#4338ca; --green:#059669; --orange:#d97706; --red:#dc2626;
  --border:#e5e7eb; --surface:#ffffff; --surface2:#f1f2f6;
  --accent-soft:#eef0ff; --green-soft:#ecfdf5; --orange-soft:#fffbeb; --red-soft:#fef2f2;
  --sidebar-bg:#14161f; --sidebar-text:#8f95ab; --sidebar-border:#24263a;
  --sidebar-w:222px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Outfit',sans-serif;margin:0}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:'Inter',sans-serif;font-size:14px}
input,select,textarea{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--ink);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--accent-soft)}

/* ===== LOGIN ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(circle at 20% 20%, #eef0ff 0%, transparent 45%),radial-gradient(circle at 80% 80%, #f1f2f6 0%, transparent 45%)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 38px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 60px -12px rgba(18,20,28,.12)}
.wordmark{font-family:'Outfit',sans-serif;font-weight:800;letter-spacing:-.02em;display:inline-flex;align-items:center;gap:8px}
.wordmark .mark{width:10px;height:10px;border-radius:3.5px;background:var(--gold);display:inline-block;flex-shrink:0}
.login-box .wordmark{font-size:26px;justify-content:center;width:100%}
.login-box .subtitle{font-size:11px;letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-top:4px;margin-bottom:26px}
.login-box input{margin-bottom:12px;text-align:center}
.login-box button{width:100%;background:var(--gold);color:#fff;border:none;border-radius:9px;padding:12px;font-weight:700;font-size:13.5px;cursor:pointer;letter-spacing:.02em;transition:background .15s}
.login-box button:hover{background:var(--gold2)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;z-index:50}
.sidebar-logo{padding:24px 22px 20px;border-bottom:1px solid var(--sidebar-border)}
.sidebar-logo .wordmark{font-size:21px;line-height:1;color:#fff}
.sidebar-logo .subtitle{font-size:10px;letter-spacing:.14em;color:var(--sidebar-text);text-transform:uppercase;margin-top:4px;margin-left:18px}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.snav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--sidebar-text);font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:1px;transition:all .12s}
.snav-link:hover{background:rgba(255,255,255,.06);color:#fff}
.snav-link.active{background:var(--gold);color:#fff;font-weight:600}
.snav-icon{width:16px;text-align:center;opacity:.9;font-size:13px}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--sidebar-border)}
.sidebar-foot .clk{font-size:11px;color:var(--sidebar-text);font-variant-numeric:tabular-nums}
.sidebar-foot .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:dot-pulse 2.4s infinite}
@keyframes dot-pulse{
  0%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}
  70%{box-shadow:0 0 0 6px rgba(5,150,105,0)}
  100%{box-shadow:0 0 0 0 rgba(5,150,105,0)}
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(220,38,38,.35)}
  70%{box-shadow:0 0 0 7px rgba(220,38,38,0)}
  100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}
}
.wcard.state-warn{border-color:var(--orange)}
.wcard.state-crit{border-color:var(--red);animation:pulse-ring 2.2s infinite}
.section-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin:26px 0 12px}
.section-label:first-child{margin-top:0}
.live-split{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.feed-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.feed-row:last-child{border-bottom:none}
.feed-row:hover{background:var(--surface2)}
.feed-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.feed-text{font-size:12.5px;line-height:1.4}
.feed-time{font-size:11px;color:var(--ink3);margin-top:1px}
.roster-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.roster-row:last-child{border-bottom:none}
.roster-name{font-weight:600}
.roster-roles{font-size:11px;color:var(--ink3);margin-top:1px}
@media (max-width:1000px){.live-split{grid-template-columns:1fr}}
.logout-btn{margin-top:10px;width:100%;background:none;border:1px solid var(--sidebar-border);border-radius:7px;padding:8px;font-size:11px;color:var(--sidebar-text);cursor:pointer;transition:all .12s}
.logout-btn:hover{border-color:var(--ink3);color:#fff}

.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:40}
.breadcrumb{font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb a{color:var(--ink3)}
.breadcrumb a:hover{color:var(--ink);text-decoration:underline}
.breadcrumb .cur{color:var(--ink);font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:14px}
.bell-wrap{position:relative}
.bell-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative;transition:border-color .12s}
.bell-btn:hover{border-color:var(--gold)}
.bell-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.bell-panel{display:none;position:absolute;top:46px;right:0;width:340px;max-height:440px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 20px 50px -12px rgba(18,20,28,.18);z-index:60}
.bell-panel.show{display:block}
.bell-panel-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.bell-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.bell-item:hover{background:var(--surface2)}
.bell-item .bt{color:var(--ink3);font-size:11px;margin-top:2px}

.content{flex:1;padding:26px 28px 60px}
.page-title{font-size:25px;font-weight:700;letter-spacing:-.01em}
.page-sub{font-size:12.5px;color:var(--ink3);margin-top:3px}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px}
.head-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(18,20,28,.03)}
.card-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.empty{color:var(--ink3);font-style:italic;padding:14px 0;text-align:center}
.clickable{cursor:pointer}
.clickable:hover{background:var(--surface2)}

.btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:all .12s}
.btn:hover{border-color:var(--ink3);color:var(--ink)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2);border-color:var(--gold2);color:#fff}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--ink2)}
.btn-ghost:hover{background:var(--surface2);color:var(--ink);border-color:var(--border)}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-block{width:100%}

.seg{display:flex;background:var(--surface2);border-radius:9px;padding:3px;gap:2px}
.seg button{border:none;background:none;padding:7px 13px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink3);transition:all .12s}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(18,20,28,.1)}
.search{max-width:280px}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);padding:8px 10px;border-bottom:1.5px solid var(--border)}
td{padding:11px 10px;border-bottom:1px solid var(--border);font-size:13px}
tr.clickable:hover td{background:var(--surface2)}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.badge.started{background:var(--green-soft);color:var(--green)}
.badge.stopped{background:var(--orange-soft);color:var(--orange)}
.badge.part{background:var(--surface2);color:var(--ink3);margin-left:6px}
.badge.muted{background:var(--surface2);color:var(--ink3)}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .12s;box-shadow:0 1px 2px rgba(18,20,28,.03)}
.stat-tile:hover{border-color:var(--gold);box-shadow:0 4px 14px -4px rgba(79,70,229,.18)}
.stat-tile.alert{border-color:var(--red)}
.stat-num{font-family:'Outfit',sans-serif;font-size:34px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.stat-tile.alert .stat-num{color:var(--red)}
.stat-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:6px}

.worker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.wcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(18,20,28,.03)}
.wcard.working{border-color:var(--green);background:var(--green-soft)}
.wcard .wname{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700}
.wcard .wrole{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.wcard .witem{font-size:13px;margin-top:9px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--border)}
.wcard .wtimer{font-family:'Outfit',sans-serif;font-size:25px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:8px}
.wcard .widle{color:var(--ink3);font-style:italic;font-size:12.5px;margin-top:10px}

.timeline-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.timeline-row:last-child{border-bottom:none}
.tl-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-actions{display:flex;gap:6px;margin-left:auto}
.tl-actions button{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:12px;padding:2px 6px}
.tl-actions button:hover{color:var(--ink)}

.field label{display:block;font-size:11px;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.row{display:flex;gap:10px;align-items:flex-end}
.row .field{flex:1}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(18,20,28,.55);backdrop-filter:blur(2px);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:26px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 30px 70px -15px rgba(18,20,28,.3)}
.modal-close{position:absolute;top:14px;right:16px;cursor:pointer;font-size:20px;color:var(--ink3)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}

.note-box{background:var(--red-soft);border:1px solid #f3b8b8;border-radius:8px;padding:10px 12px}
.note-box .nb-label{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em}
.note-box .nb-en{font-size:13.5px;margin-top:3px}
.note-box .nb-es{font-size:12.5px;font-style:italic;color:var(--ink2);margin-top:4px}

.mobile-topbar{display:none}
@media (max-width:880px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-box">
    <div class="wordmark"><span class="mark"></span>Glint</div>
    <div class="subtitle">Control Room</div>
    <input type="password" id="login-pass" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Enter</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark"><span class="mark"></span>Glint</div>
      <div class="subtitle">Control Room</div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-foot">
      <div class="clk"><span class="live-dot"></span><span id="live-clock">--:--:--</span></div>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <div class="main">
    <div class="mobile-topbar">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="wordmark" style="font-size:18px"><span class="mark"></span>Glint</div>
    </div>
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="topbar-actions">
        <div class="bell-wrap">
          <button class="bell-btn" onclick="toggleBell()">🔔<span class="bell-badge" id="bell-badge" style="display:none">0</span></button>
          <div class="bell-panel" id="bell-panel">
            <div class="bell-panel-head"><span>Notifications</span><span style="cursor:pointer;text-transform:none;font-weight:400" onclick="clearNotifications()">Clear</span></div>
            <div id="bell-list"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Generic modal for small forms (edit worker, etc.) -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
// ========================================================================
// CONSTANTS
// ========================================================================
const SUPABASE_URL = 'https://pohjqjihxnikzpbqeevn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qwe9QzcFlwuNIPAqbhPjKg_LazIReyE';
const RD_BASE = 'https://api.repairdesk.co/api/web/v1';
const RD_KEY = 'smPSStC-zBCN-bVIU-d4Yv-zPlLiMrJf';
const CANDELABRA_PARTS = ['Base','Arms','Cups and Plates','Non Silver Pieces'];
// Part names become part of the barcode ID, so strip anything non-alphanumeric
function partSlug(p){ return (p||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }
const IDLE_ALERT_HOURS = 12;
const MAX_SESSION_MS = 8*3600*1000;

const NAV_ITEMS = [
  {route:'live', label:'Live', icon:'●'},
  {route:'print', label:'Print Labels', icon:'🏷'},
  {route:'reports', label:'Reports', icon:'▤'},
  {route:'insights', label:'Insights', icon:'◆'},
  {route:'orders', label:'Orders', icon:'▦'},
  {route:'history', label:'History', icon:'≡'},
  {route:'workers', label:'Workers', icon:'◐'},
  {route:'labels', label:'Labels', icon:'▭'},
  {route:'settings', label:'Settings', icon:'⚙'},
];

// ========================================================================
// STATE
// ========================================================================
let scans=[], workers=[], roles=[], allTickets=[];
let labelSize = JSON.parse(localStorage.getItem('glint_label_size') || '{"width":102,"height":59}');
let reportRange='today', customFrom=null, customTo=null;
let empRange='today', empFrom=null, empTo=null;
let notifications = JSON.parse(localStorage.getItem('glint_notifications')||'[]');
let lastSeenTs = localStorage.getItem('glint_last_seen_ts') || null;
let itemNameCache = JSON.parse(localStorage.getItem('glint_item_names')||'{}'); // itemId -> name (fallback resolution)

// ========================================================================
// HELPERS
// ========================================================================
function escg(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function esc(s){ return escg(s); }
function jsstr(s){ return (s==null?'':String(s)).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function h(route,param){ return '#/'+route+(param!=null?'/'+encodeURIComponent(param):''); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.remove('show'), 2600);
}
function fmtDur(ms){
  if(ms<0) ms=0;
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return h+'h '+m+'m';
  if(m>0) return m+'m '+sec+'s';
  return sec+'s';
}
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString([], {month:'short',day:'numeric'})+' '+d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }
function fmtDateFull(iso){ const d=new Date(iso); return d.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'})+', '+d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }
function relTime(iso){
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function orderIdOf(itemId){ const m=(itemId||'').match(/^(T-\d+)/i); return m?m[1]:(itemId||'').split('-').slice(0,2).join('-'); }
function isCandelabra(name){ return /candelabra/i.test(name||''); }

async function sb(path, opts={}){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.headers&&opts.headers['Prefer']?opts.headers['Prefer']:'return=representation',...(opts.headers||{})}});
  if(opts.method && opts.method!=='GET') return r;
  return r.json();
}

// Resilient multi-proxy fetch for RepairDesk API (browser CORS workaround)
const PROXIES = [
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
  u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u)
];
async function fetchViaProxy(targetUrl){
  let lastErr=null;
  for(const make of PROXIES){
    try{
      const resp=await fetch(make(targetUrl));
      if(!resp.ok){ lastErr=new Error('HTTP '+resp.status); continue; }
      const txt=await resp.text();
      try{ return JSON.parse(txt); }catch(e){ lastErr=new Error('bad response'); continue; }
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('All proxies failed');
}

async function translateToSpanish(text){
  if(!text||!text.trim()) return '';
  try{
    const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q='+encodeURIComponent(text);
    const r=await fetch(url);
    const d=await r.json();
    if(Array.isArray(d)&&Array.isArray(d[0])) return d[0].map(seg=>seg[0]).join('');
  }catch(e){}
  return '';
}
let esCache={};
async function translateCached(text){
  if(!text) return '';
  if(esCache[text]!==undefined) return esCache[text];
  const t=await translateToSpanish(text);
  esCache[text]=t;
  return t;
}

// ===== RepairDesk field getters =====
function getOrderId(t){ return (t.summary&&t.summary.order_id)||''; }

// CRITICAL: RepairDesk's order_id (T-959) is NOT the internal ticket id (e.g. T-1095 => 1097).
// Guessing by stripping letters fetches a completely different ticket.
let oidMap = JSON.parse(localStorage.getItem('glint_oid_map')||'{}');
async function resolveTicketId(oid){
  if(oidMap[oid]) return oidMap[oid];
  if(allTickets.length){
    const hit=allTickets.find(x=>getOrderId(x)===oid);
    if(hit&&hit.summary&&hit.summary.id){ oidMap[oid]=hit.summary.id; localStorage.setItem('glint_oid_map',JSON.stringify(oidMap)); return oidMap[oid]; }
  }
  try{
    for(let page=1; page<=4; page++){
      const d=await fetchViaProxy(`${RD_BASE}/tickets?api_key=${RD_KEY}&per_page=250&page=${page}&default_order=1`);
      const batch=(d.data&&d.data.ticketData)||[];
      batch.forEach(t=>{ const o=t.summary&&t.summary.order_id; const id=t.summary&&t.summary.id; if(o&&id) oidMap[o]=id; });
      localStorage.setItem('glint_oid_map',JSON.stringify(oidMap));
      if(oidMap[oid]) return oidMap[oid];
      const pg=d.data&&d.data.pagination;
      if(!pg || page>=parseInt(pg.total_pages)) break;
    }
  }catch(e){}
  return null; // never guess — wrong data is worse than no data
}
function getCustomerName(t){ const s=t.summary; return s&&s.customer?(s.customer.fullName||'Unknown').trim():'Unknown'; }
function getCustomerCity(t){ const s=t.summary; if(s&&s.customer){ return s.customer.city||s.customer.town||''; } return ''; }
function getCustomerGroup(t){ const s=t.summary; if(s&&s.customer){ return (s.customer.customer_group_name||'').trim(); } return ''; }
function getCustomerPhone(t){ const s=t.summary; if(s&&s.customer){ return s.customer.mobile||s.customer.phone||''; } return ''; }
function getCustomerAddress(t){ const s=t.summary; if(s&&s.customer){ return [s.customer.address1,s.customer.address2].filter(Boolean).join(', '); } return ''; }
function getDevices(t){ return t.devices||[]; }
function getDueDate(t){
  const s=t.summary; let ts=null;
  if(s){ ts = s.due_date || s.due_on || null; }
  if(!ts && t.devices && t.devices.length){ ts = t.devices[0].due_on || t.devices[0].due_date || null; }
  if(ts) return new Date(ts*1000).toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});
  return '';
}
// Only include diagnostic/repair notes — excludes driver, delivery, and other note types
function isRepairNote(n){
  const title=((n.tittle||n.title||'')+'').toLowerCase();
  return title.includes('diagnostic');
}
// A note is only meaningful if it contains at least one letter or number
function hasMeaning(txt){ return /[a-z0-9]/i.test(txt||''); }
function getDeviceNote(device, ticket){
  const notesArr=(ticket&&ticket.notes)||[];
  const devId=String(device.device?device.device.id:(device.id||''));
  const devName=device.device_name||(device.device?device.device.name:'');
  const matching=notesArr.filter(n=>(String(n.deviceId)===devId||(n.devicename&&devName&&n.devicename.toLowerCase().includes(devName.toLowerCase())))&&isRepairNote(n));
  return matching.map(n=>(n.msg_text||'').replace(/\s*\n\s*/g,' ').trim()).filter(hasMeaning).join(' · ');
}
function makeBarcode(text){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  try{ JsBarcode(svg,text,{format:'CODE128',width:3.5,height:110,displayValue:false,margin:8,background:'#fff',lineColor:'#000'}); return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(new XMLSerializer().serializeToString(svg)))); }
  catch(e){ return ''; }
}

function pruneNotifications(){
  const cutoff=Date.now()-24*3600*1000;
  notifications=notifications.filter(n=>new Date(n.ts).getTime()>cutoff);
  localStorage.setItem('glint_notifications', JSON.stringify(notifications));
}
function checkForNewScans(){
  if(!scans.length) return;
  const sorted=[...scans].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const newest=sorted[sorted.length-1];
  if(!lastSeenTs){
    lastSeenTs=newest.created_at;
    localStorage.setItem('glint_last_seen_ts', lastSeenTs);
    renderBell(); return;
  }
  const newOnes=sorted.filter(s=>new Date(s.created_at)>new Date(lastSeenTs));
  if(newOnes.length){
    newOnes.forEach(s=>{
      const started=(s.status||'').includes('Started');
      notifications.unshift({
        itemId:s.item_id,
        text:`${s.worker} ${started?'started':'stopped'} ${s.item_desc&&s.item_desc!==s.item_id?s.item_desc:s.item_id}`,
        ts:s.created_at
      });
    });
    lastSeenTs=newest.created_at;
    localStorage.setItem('glint_last_seen_ts', lastSeenTs);
    notifications=notifications.slice(0,150);
    localStorage.setItem('glint_notifications', JSON.stringify(notifications));
  }
  pruneNotifications();
  renderBell();
}
function renderBell(){
  const badge=document.getElementById('bell-badge');
  if(notifications.length){ badge.style.display='flex'; badge.textContent=notifications.length>99?'99+':notifications.length; }
  else badge.style.display='none';
  document.getElementById('bell-list').innerHTML=notifications.length?notifications.map(n=>
    `<div class="bell-item" onclick="toggleBell();navigate('${h('item',n.itemId).replace(/'/g,"\\'")}')">${esc(n.text)}<div class="bt">${relTime(n.ts)}</div></div>`
  ).join(''):'<div class="empty" style="padding:16px">No notifications</div>';
}

// ========================================================================
function pairSessions(filterFn){
  const chron=[...scans].reverse();
  const open={}; const sessions=[];
  chron.forEach(s=>{
    const key=s.item_id+'::'+(s.role||'')+'::'+s.worker;
    if((s.status||'').includes('Started')) open[key]=s;
    else if((s.status||'').includes('Stopped') && open[key]){
      const rawMs=Math.max(0,new Date(s.created_at)-new Date(open[key].created_at));
      const runaway=rawMs>MAX_SESSION_MS;
      sessions.push({ id:s.id, item_id:s.item_id, item_desc:s.item_desc, customer:s.customer, worker:s.worker, role:s.role, start:open[key].created_at, end:s.created_at, ms:runaway?MAX_SESSION_MS:rawMs, rawMs, runaway, startId:open[key].id, endId:s.id });
      delete open[key];
    }
  });
  return { sessions: filterFn?sessions.filter(x=>filterFn(x.end)):sessions, open:Object.values(open) };
}
function computeActive(){
  const chron=[...scans].reverse();
  const itemRoleState={};
  chron.forEach(s=>{
    const key=s.item_id+'::'+(s.role||'');
    if((s.status||'').includes('Started')) itemRoleState[key]={worker:s.worker,itemId:s.item_id,itemDesc:s.item_desc,role:s.role,startedAt:s.created_at};
    else delete itemRoleState[key];
  });
  const active={}; Object.values(itemRoleState).forEach(s=>active[s.worker]=s);
  const now=Date.now();
  const stale=Object.values(itemRoleState).filter(s=>(now-new Date(s.startedAt).getTime())>IDLE_ALERT_HOURS*3600*1000);
  return {active, all:Object.values(itemRoleState), stale};
}
function analyzeItem(events){
  const evts=[...events].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let ms=0, workingBy=null, hadRunaway=false; const byWorker={}; const openByKey={};
  evts.forEach(e=>{
    const key=(e.role||'')+'::'+e.worker;
    if((e.status||'').includes('Started')){ openByKey[key]=e; }
    else if((e.status||'').includes('Stopped')&&openByKey[key]){
      const raw=new Date(e.created_at)-new Date(openByKey[key].created_at);
      // Same cap as Reports: a session longer than this was left running, not worked
      const dur=raw>MAX_SESSION_MS?MAX_SESSION_MS:raw;
      if(raw>MAX_SESSION_MS) hadRunaway=true;
      ms+=dur; byWorker[e.worker]=(byWorker[e.worker]||0)+dur;
      delete openByKey[key];
    }
  });
  const stillOpen=Object.keys(openByKey).length>0;
  if(stillOpen) workingBy=Object.values(openByKey)[0].worker;
  const done=evts.length>0&&!stillOpen;
  return { ms, working:stillOpen, workingBy, done, byWorker, hadRunaway };
}

async function loadTickets(){
  const el=document.getElementById('tickets-list');
  if(!el) return;
  el.innerHTML='<div class="empty">Loading tickets…</div>';
  try{
    let fetched=[]; let page=1, totalPages=1;
    do{
      const data=await fetchViaProxy(`${RD_BASE}/tickets?api_key=${RD_KEY}&per_page=250&page=${page}&default_order=1`);
      const batch=(data.data&&data.data.ticketData)||[];
      fetched=fetched.concat(batch);
      const pg=data.data&&data.data.pagination; totalPages=pg?parseInt(pg.total_pages):1;
      page++;
    } while(page<=totalPages && page<=2);
    allTickets=fetched;
    // Warm the order_id -> internal ticket id map while we have the list
    fetched.forEach(t=>{ const o=t.summary&&t.summary.order_id; const id=t.summary&&t.summary.id; if(o&&id) oidMap[o]=id; });
    localStorage.setItem('glint_oid_map',JSON.stringify(oidMap));
    renderTickets(allTickets);
  }catch(err){
    el.innerHTML='<div class="empty">Could not load tickets — '+esc(err.message)+'. Tap Reload to try again.</div>';

function inRange(dateStr){
  const d=new Date(dateStr);
  if(reportRange==='custom'){ if(customFrom&&d<customFrom)return false; if(customTo&&d>customTo)return false; return true; }
  if(reportRange==='all') return true;
  const now=new Date();
  if(reportRange==='today') return d.toDateString()===now.toDateString();
  if(reportRange==='week'){ const wk=new Date(now); wk.setDate(now.getDate()-7); return d>=wk; }
  if(reportRange==='month'){ const mo=new Date(now); mo.setMonth(now.getMonth()-1); return d>=mo; }
  return true;
}

function weekStart(dateInput){
  const dt=new Date(dateInput);
  const day=dt.getDay(); // 0=Sun..6=Sat
  const diff=(day===0?-6:1-day); // Monday-based week start
  dt.setDate(dt.getDate()+diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function renderWeeklyTrend(){
  const el=document.getElementById('weekly-trend');
  if(!el) return;
  const {sessions}=pairSessions(()=>true); // all-time, independent of the table date filter
  const weeks={}; // key: week-start ISO date -> ms
  sessions.forEach(s=>{
    const wk=weekStart(s.end).toISOString().slice(0,10);
    weeks[wk]=(weeks[wk]||0)+s.ms;
  });
  // Build last 10 week buckets (including zero weeks), ending with the current week
  const buckets=[];
  const curWk=weekStart(new Date());
  for(let i=9;i>=0;i--){
    const d=new Date(curWk); d.setDate(d.getDate()-7*i);
    const key=d.toISOString().slice(0,10);
    buckets.push({key, date:d, ms:weeks[key]||0});
  }
  const maxMs=Math.max(...buckets.map(b=>b.ms), 1);
  el.innerHTML=`<div style="display:flex;align-items:flex-end;gap:8px;height:150px;padding:10px 4px 0">
    ${buckets.map(b=>{
      const pct=Math.round((b.ms/maxMs)*100);
      const hrs=(b.ms/3600000).toFixed(1);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">${b.ms>0?hrs+'h':''}</div>
        <div style="width:100%;max-width:34px;height:${Math.max(pct,2)}%;background:${b.ms>0?'var(--gold)':'var(--surface2)'};border-radius:4px 4px 0 0" title="${fmtDur(b.ms)}"></div>
        <div style="font-size:9.5px;color:var(--ink3);margin-top:6px;white-space:nowrap">${b.date.toLocaleDateString([], {month:'short',day:'numeric'})}</div>
      </div>`;
    }).join('')}
  </div>`;
}

  document.querySelector('#worker-report tbody').innerHTML=wr||'<tr><td colspan="4" class="empty">No sessions in this range</td></tr>';

let insightsRange='all', insightsFrom=null, insightsTo=null;
function insightsInRange(dateStr){
  const d=new Date(dateStr);
  if(insightsRange==='custom'){ if(insightsFrom&&d<insightsFrom)return false; if(insightsTo&&d>insightsTo)return false; return true; }
  if(insightsRange==='all') return true;
  const now=new Date();
  if(insightsRange==='today') return d.toDateString()===now.toDateString();
  if(insightsRange==='week'){ const wk=new Date(now); wk.setDate(now.getDate()-7); return d>=wk; }
  if(insightsRange==='month'){ const mo=new Date(now); mo.setMonth(now.getMonth()-1); return d>=mo; }
  return true;
}
function insightsSetRange(r){
  insightsRange=r; insightsFrom=null; insightsTo=null;
  document.getElementById('ins-from').value=''; document.getElementById('ins-to').value='';
  document.querySelectorAll('#ins-range-seg button').forEach(b=>b.classList.toggle('on', b.dataset.r===r));
  renderInsightsBody();
}
function insightsCustomRange(){
  const f=document.getElementById('ins-from').value, t=document.getElementById('ins-to').value;
  insightsFrom=f?new Date(f+'T00:00:00'):null; insightsTo=t?new Date(t+'T23:59:59'):null;
  if(insightsFrom||insightsTo){ insightsRange='custom'; document.querySelectorAll('#ins-range-seg button').forEach(b=>b.classList.remove('on')); }
  renderInsightsBody();
}
// Group split-part items back to their base type ("Vase Large — Base" -> "Vase Large")
function normalizeItemType(desc){
  if(!desc||!desc.trim()) return null;
  return desc.replace(/\s+—\s+.+$/,'').trim();
}
function renderInsightsPage(){
  insightsRange='all'; insightsFrom=null; insightsTo=null;
  document.getElementById('content').innerHTML=`
    <div class="page-head">
      <div><div class="page-title">Insights</div><div class="page-sub">Service times, worker speed, and which items take longest — for pricing and staffing</div></div>
      <div class="head-actions">
        <div class="seg" id="ins-range-seg">
          <button data-r="today" onclick="insightsSetRange('today')">Today</button>
          <button data-r="week" onclick="insightsSetRange('week')">Week</button>
          <button data-r="month" onclick="insightsSetRange('month')">Month</button>
          <button class="on" data-r="all" onclick="insightsSetRange('all')">All</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)">
          <input type="date" id="ins-from" onchange="insightsCustomRange()" style="padding:6px 8px;font-size:12px;width:auto">
          <span>→</span>
          <input type="date" id="ins-to" onchange="insightsCustomRange()" style="padding:6px 8px;font-size:12px;width:auto">
        </div>
      </div>
    </div>
    <div id="insights-body"></div>
  `;
  renderInsightsBody();
}
function renderInsightsBody(){
  const box=document.getElementById('insights-body');
  if(!box) return;
  const {sessions}=pairSessions(insightsInRange);
  if(!sessions.length){ box.innerHTML='<div class="card"><div class="empty">No completed sessions in this range yet</div></div>'; return; }

  // ---- 1. Average time per service (role) ----
  const roleAgg={};
  sessions.forEach(s=>{
    const r=s.role||'—';
    if(!roleAgg[r]) roleAgg[r]={ms:0,count:0};
    roleAgg[r].ms+=s.ms; roleAgg[r].count++;
  });
  const roleRows=Object.entries(roleAgg).map(([r,d])=>({role:r,avg:d.ms/d.count,total:d.ms,count:d.count})).sort((a,b)=>b.avg-a.avg);
  const maxAvgRole=Math.max(...roleRows.map(r=>r.avg),1);

  let html=`<div class="card">
    <div class="card-label">Average Time per Service</div>
    ${roleRows.map(r=>`<div style="padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px">
        <strong>${esc(r.role)}</strong>
        <span>${fmtDur(r.avg)} avg <span style="color:var(--ink3);font-weight:400">· ${r.count} session${r.count!==1?'s':''} · ${fmtDur(r.total)} total</span></span>
      </div>
      <div style="height:7px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="width:${Math.round(r.avg/maxAvgRole*100)}%;height:100%;background:var(--gold)"></div></div>
    </div>`).join('')}
  </div>`;

  // ---- 2. Fastest workers per service (min 2 sessions per worker+role to avoid single-sample noise) ----
  const workerRoleAgg={}; // role -> worker -> {ms,count}
  sessions.forEach(s=>{
    const r=s.role||'—';
    if(!workerRoleAgg[r]) workerRoleAgg[r]={};
    if(!workerRoleAgg[r][s.worker]) workerRoleAgg[r][s.worker]={ms:0,count:0};
    workerRoleAgg[r][s.worker].ms+=s.ms; workerRoleAgg[r][s.worker].count++;
  });
  html+=`<div class="card">
    <div class="card-label">Fastest Workers by Service <span style="font-weight:600;text-transform:none;color:var(--ink3)">— ranked fastest to slowest, minimum 2 sessions</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
    ${Object.entries(workerRoleAgg).map(([role,workers])=>{
      const ranked=Object.entries(workers).map(([w,d])=>({worker:w,avg:d.ms/d.count,count:d.count})).filter(x=>x.count>=2).sort((a,b)=>a.avg-b.avg);
      if(!ranked.length) return '';
      return `<div>
        <div style="font-size:11px;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${esc(role)}</div>
        ${ranked.map((x,i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;${i===0?'font-weight:700':''}">
          <span>${i===0?'🥇 ':''}${esc(x.worker)}</span>
          <span style="color:${i===0?'var(--green)':'var(--ink2)'}">${fmtDur(x.avg)} <span style="color:var(--ink3);font-size:11px">(${x.count})</span></span>
        </div>`).join('')}
      </div>`;
    }).filter(Boolean).join('') || '<div class="empty">Not enough repeat data yet — need at least 2 sessions per worker on the same service</div>'}
    </div>
  </div>`;

  // ---- 3. Items that take longest ----
  const itemTypeAgg={};
  let unresolvedCount=0;
  sessions.forEach(s=>{
    const type=normalizeItemType(s.item_desc);
    if(!type){ unresolvedCount++; return; }
    if(!itemTypeAgg[type]) itemTypeAgg[type]={ms:0,count:0};
    itemTypeAgg[type].ms+=s.ms; itemTypeAgg[type].count++;
  });
  const itemRows=Object.entries(itemTypeAgg).map(([t,d])=>({type:t,avg:d.ms/d.count,total:d.ms,count:d.count})).sort((a,b)=>b.avg-a.avg);
  html+=`<div class="card">
    <div class="card-label">Items That Take Longest <span style="font-weight:600;text-transform:none;color:var(--ink3)">— average time per work session, by item type</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Item Type</th><th>Avg per Session</th><th>Total Time</th><th>Sessions</th></tr></thead><tbody>
    ${itemRows.length?itemRows.map(r=>`<tr><td><strong>${esc(r.type)}</strong></td><td>${fmtDur(r.avg)}</td><td>${fmtDur(r.total)}</td><td>${r.count}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">No item data yet</td></tr>'}
    </tbody></table></div>
    ${unresolvedCount?`<div style="font-size:11px;color:var(--ink3);margin-top:10px">${unresolvedCount} session${unresolvedCount!==1?'s':''} skipped — item name wasn't recorded (older scans from before the name-resolve fix)</div>`:''}
  </div>`;

  box.innerHTML=html;
}

function renderOrdersList(){
  const q=(document.getElementById('orders-search').value||'').toLowerCase().trim();
  const orders={};
  scans.forEach(s=>{
    const oid=orderIdOf(s.item_id);
    if(!orders[oid]) orders[oid]={items:{}, customer:s.customer, last:s.created_at};
    if(!orders[oid].items[s.item_id]) orders[oid].items[s.item_id]={desc:s.item_desc, events:[]};
    orders[oid].items[s.item_id].events.push(s);
    if(new Date(s.created_at)>new Date(orders[oid].last)) orders[oid].last=s.created_at;
    if(s.customer&&s.customer!=='undefined'&&!orders[oid].customer) orders[oid].customer=s.customer;
  });
  let list=Object.entries(orders).sort((a,b)=>new Date(b[1].last)-new Date(a[1].last));
  if(q) list=list.filter(([oid,o])=>{
    if(oid.toLowerCase().includes(q)||(o.customer||'').toLowerCase().includes(q)) return true;
    return Object.entries(o.items).some(([iid,it])=>iid.toLowerCase().includes(q)||(it.desc||'').toLowerCase().includes(q)||it.events.some(e=>(e.worker||'').toLowerCase().includes(q)));
  });
  const el=document.getElementById('orders-list');
  if(!list.length){ el.innerHTML='<div class="empty">No orders match</div>'; return; }
  el.innerHTML=list.map(([oid,o])=>{
    const items=Object.entries(o.items);
    let doneCount=0, totalMs=0, anyWorking=false, anyRunaway=false;
    items.forEach(([iid,it])=>{ const a=analyzeItem(it.events); totalMs+=a.ms; if(a.done)doneCount++; if(a.working)anyWorking=true; if(a.hadRunaway)anyRunaway=true; });
    const pct=items.length?Math.round(doneCount/items.length*100):0;
    // Orders not matching our T-#### label format came from scanning a non-Glint barcode
    const isJunk=!/^T-\d+$/i.test(oid);
    const hasName=o.customer&&o.customer!=='undefined';
    return `<div class="card clickable" onclick="navigate('${h('order',oid).replace(/'/g,"\\'")}')"${isJunk?' style="border-color:var(--orange)"':''}>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--gold2)">${esc(oid)}${isJunk?' · <span style="color:var(--orange)">⚠️ NOT A GLINT LABEL</span>':''}${anyWorking?' · <span style="color:var(--green)">● IN PROGRESS</span>':(pct===100?' · <span style="color:var(--ink3)">✓ COMPLETE</span>':'')}</div>
          <div style="font-family:'Outfit',sans-serif;font-size:21px;font-weight:700${hasName?'':';color:var(--ink3)'}">${hasName?esc(o.customer):'Name not recorded'}</div>
          <div style="font-size:11.5px;color:var(--ink3);margin-top:2px">${items.length} item${items.length!==1?'s':''} · ${doneCount} done${anyRunaway?' · <span style="color:var(--orange)">⚠️ includes capped time</span>':''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:700">${doneCount}/${items.length} done</div>
          <div style="font-size:12px;color:var(--gold2);font-weight:700">${fmtDur(totalMs)}</div>
          <div style="width:130px;height:7px;background:var(--surface2);border-radius:4px;margin-top:5px;overflow:hidden;margin-left:auto"><div style="width:${pct}%;height:100%;background:${pct===100?'var(--green)':'var(--gold)'}"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

  if(evts[0]&&evts[0].customer&&evts[0].customer!=='undefined') subParts.push(esc(evts[0].customer));
  let html=`<div class="page-head"><div><div class="page-title">${esc(name||itemId)}</div>${subParts.length?`<div class="page-sub">${subParts.join(' · ')}</div>`:''}</div>
    <button class="btn btn-ghost btn-sm" onclick="navigate('${h('order',oid).replace(/'/g,"\\'")}')">📋 View full order (${esc(oid)})</button></div>`;

  html+=`<div class="card" style="text-align:center">
    <div class="card-label" style="margin-bottom:4px">Total Time Worked</div>
    <div style="font-family:'Outfit',sans-serif;font-size:34px;font-weight:700">${fmtDur(totalMs)}</div>
  </div>`;

  html+='<div class="card"><div class="card-label">Timeline <span style="font-weight:600;text-transform:none;color:var(--ink3)">— admins can edit or delete entries</span></div>';
  html+=evts.map((e,i)=>{
    const started=(e.status||'').includes('Started');
    // Flag a scan that repeats the previous one for the same worker+role (likely a double-scan)
    const prev=evts[i-1];
    const dupe=prev && ((prev.status||'').includes('Started')===started) && prev.worker===e.worker && (prev.role||'')===(e.role||'');
    return `<div class="timeline-row"${dupe?' style="background:var(--orange-soft)"':''}>
      <div class="tl-dot" style="background:${started?'var(--green)':'var(--orange)'}"></div>
      <div style="flex:1"><div style="font-weight:700">${started?'▶ Started':'■ Stopped'} · ${esc(e.role||'—')}${dupe?' <span style="color:var(--orange);font-weight:600;font-size:11px">⚠️ duplicate scan — consider deleting</span>':''}</div>
      <div style="font-size:12px;color:var(--ink3)">${esc(e.worker)} · ${fmtDateFull(e.created_at)}</div></div>
      <div class="tl-actions">
        <button onclick="editScanEntry(${e.id||'null'},()=>renderItemDetailPage('${jsstr(itemId)}'))" title="Edit time">✏️</button>
        <button onclick="deleteScanEntry(${e.id||'null'},()=>renderItemDetailPage('${jsstr(itemId)}'))" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join('')||'<div class="empty">No scans yet</div>';
  html+='</div>';

  html+='<div id="item-notes-photos"><div class="empty">Loading notes & photos…</div></div>';
  el.innerHTML=html;

  // Async: repair note (from RepairDesk), worker notes, photos
  let repairNoteBlock='';
  try{
    const tid=await resolveTicketId(oid);
    const num=parseInt(itemId.split('-')[2])||1;
    const d=tid?await fetchViaProxy(`${RD_BASE}/tickets/${tid}?api_key=${RD_KEY}`):null;
    if(d&&d.data&&d.data.devices){
      const dev=d.data.devices[num-1];
      if(dev){
        const note=getDeviceNote(dev,d.data);
        const services=dev.repairProdItems?dev.repairProdItems.map(s=>s.name.trim()).join(', '):'';
        const pre=(dev.PreConditions_images||[]).map(im=>im.medium||im.small);
        if(note){
          const noteEs=await translateCached(note);
          repairNoteBlock+=`<div class="note-box" style="margin-bottom:14px"><div class="nb-label">⚠️ Repair Note</div><div class="nb-en">${esc(note)}</div>${noteEs?`<div class="nb-es">🇪🇸 ${esc(noteEs)}</div>`:''}</div>`;
        }
        if(services) repairNoteBlock+=`<div style="font-size:12.5px;color:var(--gold2);margin-bottom:10px"><strong>Service:</strong> ${esc(services)}</div>`;
        window._itemPreImgs=pre;
      }
    }
  }catch(e){}

  let notesHtml='', photosHtml='';
  try{
    const nr=await sb('item_notes?item_id=eq.'+encodeURIComponent(itemId)+'&select=*&order=created_at.desc');
    if(nr&&nr.length) notesHtml='<div class="card-label" style="margin-top:14px">Worker Notes</div>'+nr.map(n=>`<div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:6px"><div style="font-size:13px">${esc(n.note)}</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">${esc(n.worker)}${n.role?' · '+esc(n.role):''} · ${fmtDateFull(n.created_at)}</div></div>`).join('');
  }catch(e){}
  try{
    const ir=await sb('item_images?item_id=eq.'+encodeURIComponent(itemId)+'&select=*&order=created_at.desc');
    const workerImgs=(ir||[]).map(i=>i.image_url);
    const pre=window._itemPreImgs||[];
    if(workerImgs.length) photosHtml+='<div class="card-label" style="margin-top:14px">Our Photos ('+workerImgs.length+')</div><div class="photo-grid">'+workerImgs.map(u=>`<img src="${u}" onclick="lightbox('${jsstr(u)}')">`).join('')+'</div>';
    if(pre.length) photosHtml+='<div class="card-label" style="margin-top:14px">Intake Photos (RepairDesk)</div><div class="photo-grid">'+pre.map(u=>`<img src="${u}" onclick="lightbox('${jsstr(u)}')">`).join('')+'</div>';
  }catch(e){}

  const box=document.getElementById('item-notes-photos');
  if(box) box.innerHTML = (repairNoteBlock||notesHtml||photosHtml) ? `<div class="card">${repairNoteBlock}${notesHtml}${photosHtml}</div>` : '';
}
function lightbox(url){ window.open(url,'_blank'); }

function renderHistoryPage(){
  document.getElementById('content').innerHTML=`
    <div class="page-head">
      <div><div class="page-title">History</div><div class="page-sub">Every scan, newest first — admins can edit or delete entries</div></div>
      <div class="head-actions">
        <input class="search" id="history-search" placeholder="Search item, worker, customer..." oninput="renderHistoryTable()">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)">
          <input type="date" id="hist-from" onchange="renderHistoryTable()" style="padding:6px 8px;font-size:12px;width:auto">
          <span>→</span>
          <input type="date" id="hist-to" onchange="renderHistoryTable()" style="padding:6px 8px;font-size:12px;width:auto">
        </div>
        <button class="btn btn-ghost btn-sm" onclick="exportHistory()">⬇ Export CSV</button>
      </div>
    </div>
    <div class="card"><div style="overflow-x:auto">
      <table id="history-table"><thead><tr><th>Time</th><th>Item</th><th>Customer</th><th>Worker</th><th>Role</th><th>Action</th><th></th></tr></thead><tbody></tbody></table>
    </div></div>
  `;
  renderHistoryTable();
}
function renderHistoryTable(){
  if(!document.getElementById('history-table')) return;
  const q=(document.getElementById('history-search').value||'').toLowerCase();
  const fEl=document.getElementById('hist-from'), tEl=document.getElementById('hist-to');
  const from=fEl&&fEl.value?new Date(fEl.value+'T00:00:00'):null;
  const to=tEl&&tEl.value?new Date(tEl.value+'T23:59:59'):null;
  const rows=scans.filter(s=>{
    if(q&&!(s.item_id+s.worker+(s.customer||'')+(s.item_desc||'')).toLowerCase().includes(q)) return false;
    const d=new Date(s.created_at);
    if(from&&d<from) return false;
    if(to&&d>to) return false;
    return true;
  }).slice(0,800).map(s=>`
    <tr><td style="white-space:nowrap">${fmtDate(s.created_at)}</td>
    <td class="clickable" onclick="navigate('${h('item',s.item_id).replace(/'/g,"\\'")}')"><strong>${s.item_desc&&s.item_desc!==s.item_id?esc(s.item_desc):''}</strong>${s.item_desc&&s.item_desc!==s.item_id?'<br>':''}<span style="color:var(--ink3);font-size:11px">${esc(s.item_id)}</span></td>
    <td>${esc(s.customer||'—')}</td><td>${esc(s.worker)}</td><td>${esc(s.role||'—')}</td>
    <td>${(s.status||'').includes('Started')?'<span class="badge started">▶ Start</span>':'<span class="badge stopped">■ Stop</span>'}</td>
    <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="editScanEntry(${s.id||'null'},renderHistoryTable)">✏️</button> <button class="btn btn-ghost btn-sm" onclick="deleteScanEntry(${s.id||'null'},renderHistoryTable)">🗑️</button></td>
    </tr>`).join('');
  document.querySelector('#history-table tbody').innerHTML=rows||'<tr><td colspan="7" class="empty">No scans in this range</td></tr>';
}
function exportHistory(){
  let csv='Time,Item ID,Item,Customer,Worker,Role,Action\n';
  scans.forEach(s=>{ csv+=`"${fmtDateFull(s.created_at)}","${s.item_id}","${(s.item_desc||'').replace(/"/g,'""')}","${(s.customer||'').replace(/"/g,'""')}","${s.worker}","${s.role||''}","${(s.status||'').includes('Started')?'Start':'Stop'}"\n`; });
  downloadCsv(csv,'glint-history.csv');
}

// PAGE: WORKER DETAIL (employee report)
// ========================================================================
function empInRange(dateStr){
  const d=new Date(dateStr);
  if(empRange==='custom'){ if(empFrom&&d<empFrom)return false; if(empTo&&d>empTo)return false; return true; }
  if(empRange==='all') return true;
  const now=new Date();
  if(empRange==='today') return d.toDateString()===now.toDateString();
  if(empRange==='week'){ const wk=new Date(now); wk.setDate(now.getDate()-7); return d>=wk; }
  if(empRange==='month'){ const mo=new Date(now); mo.setMonth(now.getMonth()-1); return d>=mo; }
  return true;
}
function empSetRange(r){
  empRange=r; empFrom=null; empTo=null;
  document.getElementById('emp-from').value=''; document.getElementById('emp-to').value='';
  document.querySelectorAll('#emp-range-seg button').forEach(b=>b.classList.toggle('on', b.dataset.r===r));
  renderEmployeeReportBody(window._empName);
}
function empCustomRange(){
  const f=document.getElementById('emp-from').value, t=document.getElementById('emp-to').value;
  empFrom=f?new Date(f+'T00:00:00'):null; empTo=t?new Date(t+'T23:59:59'):null;
  if(empFrom||empTo){ empRange='custom'; document.querySelectorAll('#emp-range-seg button').forEach(b=>b.classList.remove('on')); }
  renderEmployeeReportBody(window._empName);
}
function renderWorkerDetailPage(name){
  window._empName=name; empRange='today'; empFrom=null; empTo=null;
  document.getElementById('content').innerHTML=`
    <div class="page-head">
      <div><div class="page-title">${esc(name)}</div><div class="page-sub">Full work history</div></div>
      <div class="head-actions">
        <div class="seg" id="emp-range-seg">
          <button class="on" data-r="today" onclick="empSetRange('today')">Today</button>
          <button data-r="week" onclick="empSetRange('week')">Week</button>
          <button data-r="month" onclick="empSetRange('month')">Month</button>
          <button data-r="all" onclick="empSetRange('all')">All</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)">
          <input type="date" id="emp-from" onchange="empCustomRange()" style="padding:6px 8px;font-size:12px;width:auto">
          <span>→</span>
          <input type="date" id="emp-to" onchange="empCustomRange()" style="padding:6px 8px;font-size:12px;width:auto">
        </div>
        <input class="search" id="emp-search" placeholder="Search ticket, item..." oninput="renderEmployeeReportBody(window._empName)">
        <button class="btn btn-ghost btn-sm" onclick="exportEmployeeReport()">⬇ Export CSV</button>
      </div>
    </div>
    <div id="emp-content"></div>
  `;
  renderEmployeeReportBody(name);
}
function renderEmployeeReportBody(name){
  if(!name) return;
  const q=(document.getElementById('emp-search')?.value||'').toLowerCase().trim();
  const res=pairSessions(empInRange);
  let mine=res.sessions.filter(s=>s.worker===name);
  const openNow=res.open.filter(o=>o.worker===name);
  const totalMs=mine.reduce((a,s)=>a+s.ms,0);
  const items=new Set(mine.map(s=>s.item_id));
  const byOrder={};
  mine.forEach(s=>{ const oid=orderIdOf(s.item_id); if(!byOrder[oid])byOrder[oid]={ms:0,sessions:[],items:new Set()}; byOrder[oid].ms+=s.ms; byOrder[oid].sessions.push(s); byOrder[oid].items.add(s.item_id); });
  const byRole={}; mine.forEach(s=>{ const r=s.role||'—'; byRole[r]=(byRole[r]||0)+s.ms; });
  const byDay={}; mine.forEach(s=>{ const d=new Date(s.end).toLocaleDateString(); byDay[d]=(byDay[d]||0)+s.ms; });
  let orderList=Object.entries(byOrder).sort((a,b)=>b[1].ms-a[1].ms);
  if(q) orderList=orderList.filter(([oid,o])=>oid.toLowerCase().includes(q)||o.sessions.some(s=>(s.item_desc||'').toLowerCase().includes(q)||s.item_id.toLowerCase().includes(q)));

  let html=`<div class="stat-grid">
    <div class="card" style="text-align:center;margin:0"><div class="card-label">Total Time</div><div class="stat-num" style="font-size:28px">${fmtDur(totalMs)}</div></div>
    <div class="card" style="text-align:center;margin:0"><div class="card-label">Items</div><div class="stat-num" style="font-size:28px">${items.size}</div></div>
    <div class="card" style="text-align:center;margin:0"><div class="card-label">Sessions</div><div class="stat-num" style="font-size:28px">${mine.length}</div></div>
    <div class="card" style="text-align:center;margin:0"><div class="card-label">Orders</div><div class="stat-num" style="font-size:28px">${Object.keys(byOrder).length}</div></div>
  </div>`;

  if(openNow.length){
    html+='<div class="card" style="background:var(--green-soft);border-color:var(--green)"><div class="card-label" style="color:var(--green)">▶ Working Right Now</div>'+
      openNow.map(o=>`<div class="clickable" style="padding:8px 0" onclick="navigate('${h('item',o.item_id).replace(/'/g,"\\'")}')"><strong>${o.item_desc&&o.item_desc!==o.item_id?esc(o.item_desc):esc(o.item_id)}</strong> <span style="color:var(--ink3);font-size:11px">${esc(o.item_id)}</span> · ${esc(o.role||'—')} · since ${fmtDateFull(o.created_at)}</div>`).join('')+'</div>';
  }

  html+='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">';
  html+='<div class="card" style="flex:1;min-width:240px;margin:0"><div class="card-label">Time by Role</div>'+
    (Object.entries(byRole).sort((a,b)=>b[1]-a[1]).map(([r,ms])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span>${esc(r)}</span><strong>${fmtDur(ms)}</strong></div>`).join('')||'<div class="empty">None</div>')+'</div>';
  html+='<div class="card" style="flex:1;min-width:240px;margin:0"><div class="card-label">Time by Day</div>'+
    (Object.entries(byDay).sort((a,b)=>new Date(b[0])-new Date(a[0])).map(([d,ms])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span>${esc(d)}</span><strong>${fmtDur(ms)}</strong></div>`).join('')||'<div class="empty">None</div>')+'</div>';
  html+='</div>';

  html+='<div class="card"><div class="card-label">Work by Order</div>';
  html+=orderList.length?orderList.map(([oid,o])=>{
    const safe='emp-'+oid.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div style="border-bottom:1px solid var(--border);padding:12px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="const b=document.getElementById('${safe}');b.style.display=b.style.display==='none'?'block':'none'">
        <div><span style="font-weight:700;color:var(--gold2)">${esc(oid)}</span> <span style="color:var(--ink3);font-size:12px">${o.items.size} item(s), ${o.sessions.length} session(s)</span></div>
        <div style="display:flex;gap:8px;align-items:center"><strong style="color:var(--gold2)">${fmtDur(o.ms)}</strong>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();navigate('${h('order',oid).replace(/'/g,"\\'")}')">Open order →</button></div>
      </div>
      <div id="${safe}" style="display:none;margin-top:8px;padding-left:12px">
        ${o.sessions.sort((a,b)=>new Date(b.end)-new Date(a.end)).map(s=>`<div class="clickable" style="padding:6px 0;font-size:13px" onclick="navigate('${h('item',s.item_id).replace(/'/g,"\\'")}')">
          <div style="display:flex;justify-content:space-between"><span>${s.item_desc&&s.item_desc!==s.item_id?esc(s.item_desc):esc(s.item_id)} <span style="color:var(--ink3);font-size:11px">${esc(s.item_id)}</span></span><span style="color:${s.runaway?'var(--red)':'var(--gold2)'};font-weight:700">${fmtDur(s.ms)}${s.runaway?' ⚠️':''}</span></div>
          <div style="font-size:11px;color:var(--ink3)">${esc(s.role||'—')} · ${fmtDateFull(s.start)} → ${fmtDateFull(s.end)}${s.runaway?' · left running':''}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join(''):'<div class="empty">No work in this range</div>';
  html+='</div>';
  document.getElementById('emp-content').innerHTML=html;
}
function exportEmployeeReport(){
  const name=window._empName;
  const res=pairSessions(empInRange);
  const mine=res.sessions.filter(s=>s.worker===name).sort((a,b)=>new Date(b.end)-new Date(a.end));
  let csv='Order,Item,Item ID,Role,Start,End,Minutes,Flag\n';
  mine.forEach(s=>{ csv+=`"${orderIdOf(s.item_id)}","${(s.item_desc||'').replace(/"/g,'""')}","${s.item_id}","${s.role||''}","${fmtDateFull(s.start)}","${fmtDateFull(s.end)}",${Math.round(s.ms/60000)},"${s.runaway?'left running':''}"\n`; });
  downloadCsv(csv,name+'-report.csv');
}

// ========================================================================
// PAGE: LABELS
// ========================================================================
async function renderLabelsPage(){
  document.getElementById('content').innerHTML=`
    <div class="page-head">
      <div><div class="page-title">Labels</div><div class="page-sub">Every barcode printed, newest first</div></div>
      <div class="head-actions">
        <input class="search" id="labels-search" placeholder="Search..." oninput="renderLabelsTable()">
        <button class="btn btn-ghost btn-sm" onclick="exportLabels()">⬇ Export CSV</button>
      </div>
    </div>
    <div class="card"><div style="overflow-x:auto">
      <table id="labels-table"><thead><tr><th>Printed</th><th>Item ID</th><th>Item</th><th>Customer</th><th>City</th><th>Part</th></tr></thead><tbody></tbody></table>
    </div></div>
  `;
  window._labels=await sb('labels?select=*&order=printed_at.desc&limit=1000').catch(()=>[]);
  renderLabelsTable();
}
function renderLabelsTable(){
  const q=(document.getElementById('labels-search').value||'').toLowerCase();
  const list=(window._labels||[]).filter(l=>!q||(l.item_id+l.item_name+(l.customer||'')).toLowerCase().includes(q));
  document.querySelector('#labels-table tbody').innerHTML=list.length?list.map(l=>`
    <tr><td>${fmtDate(l.printed_at)}</td><td><strong>${esc(l.item_id)}</strong></td><td>${esc(l.item_name||'—')}</td><td>${esc(l.customer||'—')}</td><td>${esc(l.city||'—')}</td><td>${l.part?'<span class="badge part">'+esc(l.part)+'</span>':'—'}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">No labels printed yet</td></tr>';
}
function exportLabels(){
  let csv='Printed,Item ID,Item,Customer,City,Part\n';
  (window._labels||[]).forEach(l=>{ csv+=`"${fmtDateFull(l.printed_at)}","${l.item_id}","${(l.item_name||'').replace(/"/g,'""')}","${(l.customer||'').replace(/"/g,'""')}","${l.city||''}","${l.part||''}"\n`; });
  downloadCsv(csv,'glint-labels.csv');
}

// ========================================================================
// PAGE: SETTINGS
// ========================================================================
function renderSettingsPage(){
  document.getElementById('content').innerHTML=`
    <div class="page-head"><div><div class="page-title">Settings</div><div class="page-sub">Manage your Control Room access</div></div></div>
    <div class="card" style="max-width:460px">
      <div class="card-label">Change Admin Password</div>
      <div class="field" style="margin-bottom:12px"><label>Current Password</label><input id="cur-pass" type="password"></div>
      <div class="field" style="margin-bottom:12px"><label>New Password</label><input id="new-pass" type="password" placeholder="At least 6 characters"></div>
      <div class="field" style="margin-bottom:16px"><label>Confirm New Password</label><input id="new-pass2" type="password"></div>
      <button class="btn btn-gold btn-block" onclick="changeAdminPassword()">Update Password</button>
    </div>
    <div class="card" style="max-width:460px">
      <div class="card-label">Label Size</div>
      <div class="page-sub" style="margin-bottom:14px">Set your Dymo label dimensions in millimeters</div>
      <div class="row" style="margin-bottom:14px">
        <div class="field"><label>Width (mm)</label><input id="ls-width" type="number"></div>
        <div class="field"><label>Height (mm)</label><input id="ls-height" type="number"></div>
        <button class="btn btn-sm" onclick="saveLabelSize()">Save</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="setLabelPreset(102,59)">102 × 59</button>
        <button class="btn btn-ghost btn-sm" onclick="setLabelPreset(89,36)">89 × 36</button>
        <button class="btn btn-ghost btn-sm" onclick="setLabelPreset(57,32)">57 × 32</button>
        <button class="btn btn-ghost btn-sm" onclick="setLabelPreset(54,25)">54 × 25</button>
      </div>
    </div>
  `;
  document.getElementById('ls-width').value=labelSize.width;
  document.getElementById('ls-height').value=labelSize.height;
}
async function changeAdminPassword(){
  const cur=document.getElementById('cur-pass').value, nw=document.getElementById('new-pass').value, nw2=document.getElementById('new-pass2').value;
  const real=await fetchAdminPass();
  if(cur!==real){ toast('Current password incorrect'); return; }
  if(nw.length<6){ toast('New password must be at least 6 characters'); return; }
  if(nw!==nw2){ toast('New passwords do not match'); return; }
  const r=await sb('settings?key=eq.admin_password',{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({value:nw})});
  if(r.ok){ toast('✅ Password updated'); document.getElementById('cur-pass').value=''; document.getElementById('new-pass').value=''; document.getElementById('new-pass2').value=''; }
  else toast('Could not update password');
}
function saveLabelSize(){
  const w=parseFloat(document.getElementById('ls-width').value), hgt=parseFloat(document.getElementById('ls-height').value);
  if(!w||!hgt||w<10||hgt<10){ toast('Enter valid dimensions'); return; }
  labelSize={width:w,height:hgt}; localStorage.setItem('glint_label_size', JSON.stringify(labelSize));
  toast('✅ Label size saved: '+w+' × '+hgt+' mm');
}
function setLabelPreset(w,hgt){
  labelSize={width:w,height:hgt}; localStorage.setItem('glint_label_size', JSON.stringify(labelSize));
  document.getElementById('ls-width').value=w; document.getElementById('ls-height').value=hgt;
  toast('✅ Label size: '+w+' × '+hgt+' mm');
}

// ========================================================================
// PHOTOS MODAL (used from Print Labels page) — index registry avoids quote-escaping issues
// ========================================================================
window._photoRegistry=[];
function registerPhotoData(itemId,name,preImgs){
  window._photoRegistry.push({itemId,name,preImgs});
  return window._photoRegistry.length-1;
}
function openPhotosModalByIndex(idx){
  const d=window._photoRegistry[idx]; if(!d) return;
  openPhotosModal(d.itemId, d.name, d.preImgs);
}
async function openPhotosModal(itemId, name, preImgs){
  openModal(`<span class="modal-close" onclick="closeModal()">✕</span><h3 style="margin-bottom:14px">${esc(name)}</h3><div id="pm-content"><div class="empty">Loading…</div></div>`);
  const el=document.getElementById('pm-content');
  let html='';
  try{
    const imgs=await sb('item_images?item_id=eq.'+encodeURIComponent(itemId)+'&select=*&order=created_at.desc');
    if(imgs&&imgs.length) html+='<div class="card-label">Our Photos</div><div class="photo-grid" style="margin-bottom:14px">'+imgs.map(i=>`<img src="${i.image_url}" onclick="lightbox('${jsstr(i.image_url)}')">`).join('')+'</div>';
  }catch(e){}
  if(preImgs&&preImgs.length) html+='<div class="card-label">Intake Photos</div><div class="photo-grid">'+preImgs.map(u=>`<img src="${u}" onclick="lightbox('${jsstr(u)}')">`).join('')+'</div>';
  el.innerHTML=html||'<div class="empty">No photos for this item</div>';
}
</script>
